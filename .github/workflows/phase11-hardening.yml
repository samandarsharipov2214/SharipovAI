name: Phase 11 Hardening

on:
  push:
    branches: [main]
    paths:
      - 'audit/**'
      - 'campaigns/phase9_results.py'
      - 'campaigns/phase10_scaling.py'
      - 'risk/phase10_capital_engine.py'
      - 'observability/phase10_performance_alerts.py'
      - 'dashboard/**'
      - 'deploy/**'
      - 'scripts/phase10_monthly_report.py'
      - 'scripts/phase11_first_campaign_checklist.py'
      - 'tests/test_phase9_results_and_scaling.py'
      - 'tests/test_phase10_*.py'
      - 'tests/test_phase11_*.py'
      - 'tests/test_system_health_center.py'
      - 'tests/test_web2_market_chart_contract.py'
      - 'requirements*.txt'
      - 'README.md'
      - 'CONSTITUTION.md'
      - '.github/workflows/phase11-hardening.yml'
  pull_request:
    branches: [main]
    paths:
      - 'audit/**'
      - 'campaigns/phase9_results.py'
      - 'campaigns/phase10_scaling.py'
      - 'risk/phase10_capital_engine.py'
      - 'observability/phase10_performance_alerts.py'
      - 'dashboard/**'
      - 'deploy/**'
      - 'scripts/phase10_monthly_report.py'
      - 'scripts/phase11_first_campaign_checklist.py'
      - 'tests/test_phase9_results_and_scaling.py'
      - 'tests/test_phase10_*.py'
      - 'tests/test_phase11_*.py'
      - 'tests/test_system_health_center.py'
      - 'tests/test_web2_market_chart_contract.py'
      - 'requirements*.txt'
      - 'README.md'
      - 'CONSTITUTION.md'
      - '.github/workflows/phase11-hardening.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase11-hardening-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  crash-and-hardening:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      ADMIN_USERNAME: phase11-ci-admin
      ADMIN_PASSWORD: phase11-ci-password-${{ github.run_id }}
      AUTH_SECRET: phase11-ci-secret-${{ github.run_id }}
      SHARIPOVAI_DISABLE_AUTH: '0'
      SHARIPOVAI_DATABASE_REQUIRED: '1'
      DATABASE_URL: sqlite:////tmp/sharipovai-phase11-${{ github.run_id }}.db
      EXECUTION_KILL_SWITCH: '1'
      EXCHANGE_MODE: sandbox
      EXCHANGE_BASE_URL: https://api-testnet.bybit.com
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      FEATURE_BYBIT_LIVE_EXECUTION: '0'
      FEATURE_BYBIT_TESTNET_EXECUTION: '0'
      TESTNET_EXECUTION_ENABLED: '0'
      AUTONOMOUS_TESTNET_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
      BYBIT_ALLOW_LEGACY_EXCHANGE_CREDENTIALS: '0'
      RUNTIME_FILL_HARVESTER_ENABLED: '0'
      SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED: '0'
      PHASE11_MAX_TESTNET_NOTIONAL_USDT: '50'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install and audit dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip check
          python -m pip_audit -r requirements.txt --progress-spinner off

      - name: Compile production sources
        run: python -m compileall -q .

      - name: Run Phase 9 to Phase 11 crash dashboard and launch contracts
        run: |
          python -m pytest \
            tests/test_phase9_results_and_scaling.py \
            tests/test_phase10_controlled_scaling.py \
            tests/test_phase10_capital_engine.py \
            tests/test_phase11_production_audit.py \
            tests/test_phase11_dashboard_contract.py \
            tests/test_phase11_crash_resilience.py \
            tests/test_phase11_security_headers.py \
            tests/test_phase11_launch_preparation.py \
            tests/test_system_health_center.py \
            tests/test_web2_market_chart_contract.py \
            -q --tb=short \
            --junitxml=phase11-hardening-junit.xml

      - name: Run deterministic production audit
        run: |
          python - <<'PY'
          import json
          from audit.phase11_production_audit import ProductionAudit
          report = ProductionAudit('.').run()
          with open('phase11-production-audit.json', 'w', encoding='utf-8') as handle:
              json.dump(report, handle, ensure_ascii=False, indent=2, sort_keys=True, allow_nan=False)
              handle.write('\n')
          print(json.dumps(report, ensure_ascii=False, indent=2, sort_keys=True))
          raise SystemExit(0 if report['status'] == 'ready_for_bounded_testnet_preflight' else 2)
          PY

      - name: Upload hardening evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase11-hardening-evidence-${{ github.run_id }}
          path: |
            phase11-hardening-junit.xml
            phase11-production-audit.json
          if-no-files-found: error
          retention-days: 14

      - name: Remove isolated database state
        if: always()
        run: |
          rm -f \
            /tmp/sharipovai-phase11-${{ github.run_id }}.db \
            /tmp/sharipovai-phase11-${{ github.run_id }}.db-wal \
            /tmp/sharipovai-phase11-${{ github.run_id }}.db-shm
