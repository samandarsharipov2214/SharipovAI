name: Diagnose Telegram Delivery

on:
  pull_request:
    paths:
      - .github/workflows/diagnose-telegram-delivery.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: [self-hosted, Linux, X64, sharipovai-ci]
    timeout-minutes: 10
    steps:
      - name: Inspect recovery blockers
        shell: bash
        run: |
          set +e
          date -Is
          echo '=== DISK ==='
          df -hT / /opt /var/lib/docker 2>&1 || true
          df -Pm /opt/sharipovai-repo/deploy/vps 2>&1 || true
          df -i / /opt /var/lib/docker 2>&1 || true
          echo '=== MEMORY ==='
          free -h 2>&1 || true
          echo '=== DOCKER SERVICE ==='
          systemctl --no-pager --full status docker.service 2>&1 | tail -n 40 || true
          systemctl show docker.service -p ActiveState -p SubState -p Result --no-pager 2>&1 || true
          echo '=== AGENT STATUS ==='
          cat /var/lib/sharipovai-agent/status.json 2>&1 || true
          systemctl show sharipovai-agent.service -p ActiveState -p Result -p ExecMainStatus --no-pager 2>&1 || true
          echo '=== HTTP ==='
          curl -sS --max-time 5 -o /dev/null -w 'local=%{http_code}\n' http://127.0.0.1:8000/health 2>&1 || true
          curl -k -sS --max-time 8 -o /dev/null -w 'public=%{http_code}\n' https://85-137-88-17.sslip.io/health 2>&1 || true
