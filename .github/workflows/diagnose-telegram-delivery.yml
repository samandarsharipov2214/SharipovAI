name: Diagnose Telegram Delivery

on:
  pull_request:
    paths:
      - .github/workflows/diagnose-telegram-delivery.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: [self-hosted, Linux, X64, sharipovai-ci]
    timeout-minutes: 10
    steps:
      - name: Isolate recovery failure
        shell: bash
        run: |
          set +e
          echo '=== NOW ==='
          date -Is
          echo '=== STATUS JSON ==='
          cat /var/lib/sharipovai-agent/status.json 2>&1 || true
          echo
          echo '=== SERVICE RESULT ==='
          systemctl show sharipovai-agent.service \
            -p ActiveState -p SubState -p Result -p ExecMainCode -p ExecMainStatus \
            -p ActiveEnterTimestamp -p InactiveEnterTimestamp --no-pager 2>&1 || true
          echo '=== TIMER ==='
          systemctl show sharipovai-agent.timer \
            -p ActiveState -p SubState -p LastTriggerUSec -p NextElapseUSecRealtime --no-pager 2>&1 || true
          echo '=== LAST AGENT LOG ==='
          journalctl -u sharipovai-agent.service --since '20 minutes ago' \
            --no-pager -o cat 2>&1 | tail -n 180 || true
          echo '=== CURRENT HTTP ==='
          printf 'local_health='; curl -sS --max-time 5 -o /tmp/local-health -w '%{http_code}' http://127.0.0.1:8000/health 2>&1; echo
          cat /tmp/local-health 2>/dev/null || true; echo
          printf 'public_health='; curl -k -sS --max-time 8 -o /tmp/public-health -w '%{http_code}' https://85-137-88-17.sslip.io/health 2>&1; echo
          cat /tmp/public-health 2>/dev/null || true; echo
