name: Full Stabilization Suite

on:
  schedule:
    - cron: '17 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-stabilization
  cancel-in-progress: true

jobs:
  full-pytest:
    if: ${{ vars.SHARIPOVAI_SELF_HOSTED_CI == '1' }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet

      - name: Compile project
        run: python -m compileall -q .

      - name: Run full pytest suite
        id: full_pytest
        continue-on-error: true
        run: |
          set -o pipefail
          python -m pytest -q --tb=short 2>&1 | tee full-pytest.log

      - name: Upload full pytest diagnostic
        if: steps.full_pytest.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: full-stabilization-pytest-log
          path: full-pytest.log
          if-no-files-found: error
          retention-days: 3

      - name: Fail when full suite failed
        if: steps.full_pytest.outcome == 'failure'
        run: exit 1
