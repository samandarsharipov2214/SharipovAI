name: Full Stabilization Suite

on:
  push:
    branches:
      - stabilization/dashboard-runtime-v2
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements.txt

      - name: Compile project
        run: python -m compileall -q .

      - name: Run full pytest suite
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          python -m pytest -q --tb=short > pytest-full.log 2>&1

      - name: Build full-suite report
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('pytest-full.log')
          lines = source.read_text(encoding='utf-8', errors='replace').splitlines() if source.exists() else ['pytest log missing']
          markers = ('ERROR collecting', 'FAILED ', 'E   ', 'short test summary', 'ModuleNotFoundError', 'ImportError', 'SyntaxError', 'TypeError', 'AssertionError')
          selected = []
          for index, line in enumerate(lines):
              if any(marker in line for marker in markers):
                  selected.extend(lines[max(0, index - 3):min(len(lines), index + 10)])
          selected.extend(lines[-120:])
          compact = []
          seen = set()
          for line in selected:
              if line not in seen:
                  seen.add(line)
                  compact.append(line)
          report = '\n'.join(compact[-350:])
          Path('pytest-full-summary.txt').write_text(report, encoding='utf-8')
          print(report)
          PY

      - name: Upload full-suite report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-pytest-report
          path: |
            pytest-full.log
            pytest-full-summary.txt
          if-no-files-found: error

      - name: Fail when full suite failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1
