name: Agent failure diagnostics 2

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/agent-failure-diagnostics-2.yml'

permissions:
  contents: read

jobs:
  diagnose:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.head_ref == 'ops/agent-failure-diagnostics-2'
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 10
    steps:
      - name: Collect exact post-fix agent evidence
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          {
            echo '=== health ==='
            curl -sS -o /tmp/local-health -w 'LOCAL_HTTP=%{http_code}\n' --max-time 10 http://127.0.0.1:8000/health
            cat /tmp/local-health 2>/dev/null || true
            echo
            curl -k -sS -o /tmp/public-health -w 'PUBLIC_HTTP=%{http_code}\n' --max-time 15 https://85-137-88-17.sslip.io/health
            cat /tmp/public-health 2>/dev/null || true
            echo
            echo '=== service unit ==='
            systemctl cat sharipovai-agent.service 2>&1
            echo '=== service properties ==='
            systemctl show sharipovai-agent.service -p Result -p ExecMainStatus -p ExecMainCode -p ActiveState -p SubState -p Environment -p ProtectHome -p ProtectSystem -p ReadWritePaths 2>&1
            echo '=== service status ==='
            systemctl status sharipovai-agent.service --no-pager -l 2>&1
            echo '=== journal ==='
            journalctl -u sharipovai-agent.service -n 250 --no-pager -o cat 2>&1
            echo '=== repository ==='
            git -C /opt/sharipovai-repo status --short --branch 2>&1
            git -C /opt/sharipovai-repo remote -v 2>&1
            git -C /opt/sharipovai-repo rev-parse HEAD 2>&1
            stat -c '%U:%G %a %n' /opt/sharipovai-repo /opt/sharipovai-repo/.git 2>&1
            echo '=== agent state ==='
            cat /var/lib/sharipovai-agent/status.json 2>&1
            echo '=== timer ==='
            systemctl status sharipovai-agent.timer --no-pager -l 2>&1
          } > artifacts/agent-failure-diagnostics-2.txt
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: agent-failure-2-${{ github.run_id }}
          path: artifacts/agent-failure-diagnostics-2.txt
          if-no-files-found: error
          retention-days: 1
