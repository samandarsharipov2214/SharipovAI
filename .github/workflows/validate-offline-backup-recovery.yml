name: Validate Offline Backup Recovery

on:
  pull_request:
    paths:
      - deploy/vps/export_backup.sh
      - tests/test_vps_offline_backup_recovery.py
      - scripts/validate_offline_backup_recovery.sh
      - .github/workflows/validate-offline-backup-recovery.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout exact validation branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Validate shell syntax
        run: |
          bash -n deploy/vps/export_backup.sh
          bash -n scripts/validate_offline_backup_recovery.sh

      - name: Run semantic recovery tests
        run: |
          python -m pip install --quiet pytest
          python -m pytest \
            tests/test_vps_offline_backup_recovery.py \
            tests/test_vps_persistent_volume_recovery.py \
            -q

      - name: Functionally back up a stopped named volume
        run: bash scripts/validate_offline_backup_recovery.sh
