name: VPS Site Recovery

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/vps-recovery.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sharipovai-vps-recovery
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 10
    steps:
      - name: Diagnose the deployed VPS without changing it
        shell: bash
        run: |
          set -u
          APP_DIR=''
          for dir in /opt/sharipovai-repo /opt/SharipovAI; do
            if [ -d "$dir/.git" ]; then APP_DIR="$dir"; break; fi
          done

          echo "runner_user=$(id -un) uid=$(id -u) groups=$(id -Gn) host=$(hostname)"
          echo "utc=$(date -u +%FT%TZ)"
          echo "app_dir=${APP_DIR:-missing}"

          if [ -n "$APP_DIR" ]; then
            echo "=== production checkout ==="
            ls -ld "$APP_DIR" "$APP_DIR/.git" 2>&1 || true
            echo "writable=$([ -w "$APP_DIR" ] && echo yes || echo no)"
            git -c safe.directory="$APP_DIR" -C "$APP_DIR" rev-parse HEAD 2>&1 || true
            git -c safe.directory="$APP_DIR" -C "$APP_DIR" status --short --branch 2>&1 || true
            git -c safe.directory="$APP_DIR" -C "$APP_DIR" remote -v 2>&1 | sed -E 's#(https?://)[^/@]+@#\1***@#' || true
          fi

          echo "=== network listeners ==="
          ss -lnt 2>&1 || true
          echo "=== ssh configuration ==="
          grep -E '^[[:space:]]*(Port|PermitRootLogin|PasswordAuthentication)[[:space:]]' /etc/ssh/sshd_config 2>/dev/null || true

          echo "=== service health ==="
          curl -i --max-time 5 http://127.0.0.1:8000/health 2>&1 || true
          echo "=== root page ==="
          curl -i --max-time 5 http://127.0.0.1:8000/ 2>&1 | head -n 35 || true
          echo "=== deployed asset markers ==="
          curl -fsS --max-time 5 http://127.0.0.1:8000/ 2>/dev/null \
            | grep -Eo 'navigation_coordinator_v[0-9]+|market_terminal_v[0-9]+|site_polish_v[0-9]+' \
            | sort -u || true

          echo "=== runtime services ==="
          systemctl --no-pager --full status sharipovai-agent.timer sharipovai-agent.service 2>&1 || true
          systemctl list-units --type=service --all --no-pager 2>&1 \
            | grep -E 'sharipov|caddy|docker|actions.runner|ssh' || true

          echo "=== deployment capabilities ==="
          command -v sudo >/dev/null && sudo -n true 2>/dev/null && echo passwordless_sudo=yes || echo passwordless_sudo=no
          command -v docker >/dev/null && docker info >/dev/null 2>&1 && echo docker_access=yes || echo docker_access=no
          [ -n "$APP_DIR" ] && [ -r "$APP_DIR/deploy/vps/.env.vps" ] && echo production_env_readable=yes || echo production_env_readable=no

          echo "=== conclusion ==="
          echo "This diagnostic is read-only. No repository, service, container, or trading state was changed."

      - name: Publish diagnostic notification
        shell: bash
        run: |
          echo '::error::Read-only VPS diagnostic completed; inspect this run before enabling recovery.'
          exit 1
