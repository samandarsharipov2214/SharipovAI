name: React Vite Frontend

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/sharipovai-vite/**'
      - 'dashboard/gemini_chat_api.py'
      - 'dashboard/__init__.py'
      - 'dashboard/tests/test_gemini_chat_api.py'
      - '.env.example'
      - '.github/workflows/frontend-vite.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-vite-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-security:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '22'

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip check

      - name: Verify no browser Gemini secret contract exists
        shell: bash
        run: |
          set -Eeuo pipefail
          if grep -RniE 'VITE_(GEMINI|GOOGLE).*KEY|apiKey[[:space:]]*:' \
            frontend/sharipovai-vite/src \
            frontend/sharipovai-vite/package.json; then
            echo 'Browser-side Gemini key contract detected' >&2
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: frontend/sharipovai-vite
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Prepare diagnostics directory
        run: mkdir -p artifacts/frontend-vite

      - name: Strict TypeScript check
        id: typecheck
        continue-on-error: true
        working-directory: frontend/sharipovai-vite
        shell: bash
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee ../../artifacts/frontend-vite/typecheck.log

      - name: Production build
        id: build
        continue-on-error: true
        working-directory: frontend/sharipovai-vite
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee ../../artifacts/frontend-vite/build.log

      - name: Gemini gateway tests
        id: gateway_tests
        continue-on-error: true
        env:
          SHARIPOVAI_DISABLE_AUTH: '1'
          ENVIRONMENT: development
        shell: bash
        run: |
          set -o pipefail
          python -m pytest dashboard/tests/test_gemini_chat_api.py -q --tb=short \
            2>&1 | tee artifacts/frontend-vite/gateway-tests.log

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-vite-diagnostics-${{ github.run_id }}
          path: artifacts/frontend-vite
          if-no-files-found: error
          retention-days: 14

      - name: Preserve truthful frontend status
        if: always()
        env:
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          GATEWAY_TESTS_OUTCOME: ${{ steps.gateway_tests.outcome }}
        shell: bash
        run: |
          set -Eeuo pipefail
          printf 'typecheck=%s build=%s gateway_tests=%s\n' \
            "$TYPECHECK_OUTCOME" "$BUILD_OUTCOME" "$GATEWAY_TESTS_OUTCOME"
          [[ "$TYPECHECK_OUTCOME" == success ]]
          [[ "$BUILD_OUTCOME" == success ]]
          [[ "$GATEWAY_TESTS_OUTCOME" == success ]]
