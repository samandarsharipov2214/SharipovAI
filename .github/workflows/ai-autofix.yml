name: AI Autofix

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch/ref to fix"
        required: true
        default: "main"
      task:
        description: "Task for AI autofix"
        required: true
        default: "Run full pytest, fix all failures, preserve safety and compatibility."
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: ai-autofix-${{ github.event.issue.number || inputs.target_ref || github.ref }}
  cancel-in-progress: false

jobs:
  ai-autofix:
    if: >-
      vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/ai-autofix') &&
        github.actor == 'samandarsharipov2214'))
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 60

    steps:
      - name: Resolve target from comment
        id: target
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const {owner, repo} = context.repo;
            const issue = context.payload.issue;
            if (issue.pull_request) {
              const pull_number = issue.number;
              const pr = await github.rest.pulls.get({owner, repo, pull_number});
              core.setOutput('ref', pr.data.head.ref);
              core.setOutput('repo', pr.data.head.repo.full_name);
              core.setOutput('is_pr', 'true');
            } else {
              core.setOutput('ref', 'main');
              core.setOutput('repo', `${owner}/${repo}`);
              core.setOutput('is_pr', 'false');
            }

      - name: Checkout comment target
        if: github.event_name == 'issue_comment'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ steps.target.outputs.repo }}
          ref: ${{ steps.target.outputs.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout workflow dispatch ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ inputs.target_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          if [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt --quiet
          elif [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt --quiet
            python -m pip install pytest httpx fastapi uvicorn --quiet
          fi
          python -m pip check

      - name: Run AI autofix loop
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
          AI_AUTOFIX_ATTEMPTS: "2"
          AI_AUTOFIX_TASK: ${{ github.event_name == 'workflow_dispatch' && inputs.task || github.event.comment.body }}
          ADMIN_USERNAME: Samandar2212
          ADMIN_PASSWORD: ci-test-password
          AUTH_SECRET: ci-test-secret
          SHARIPOVAI_DISABLE_AUTH: "1"
          SHARIPOVAI_DATA_DIR: ${{ github.workspace }}/.ci-data
          DATABASE_URL: sqlite:////tmp/sharipovai-autofix-${{ github.run_id }}.db
          EXECUTION_KILL_SWITCH: "1"
          TESTNET_EXECUTION_ENABLED: "0"
          EXCHANGE_LIVE_TRADING_ENABLED: "0"
        run: python scripts/ai_autofix.py
        continue-on-error: true

      - name: Commit AI changes
        id: commit
        run: |
          git config user.name "SharipovAI Autofix"
          git config user.email "actions@github.com"
          git status --short
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "fix(ci): AI autofix pytest failures"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push changes to comment target
        if: steps.commit.outputs.changed == 'true' && github.event_name == 'issue_comment'
        run: git push origin HEAD:${{ steps.target.outputs.ref }}

      - name: Push changes to workflow dispatch ref
        if: steps.commit.outputs.changed == 'true' && github.event_name == 'workflow_dispatch'
        run: git push origin HEAD:${{ inputs.target_ref }}

      - name: Final pytest
        env:
          ADMIN_USERNAME: Samandar2212
          ADMIN_PASSWORD: ci-test-password
          AUTH_SECRET: ci-test-secret
          SHARIPOVAI_DISABLE_AUTH: "1"
          SHARIPOVAI_DATA_DIR: ${{ github.workspace }}/.ci-data
          DATABASE_URL: sqlite:////tmp/sharipovai-autofix-final-${{ github.run_id }}.db
          EXECUTION_KILL_SWITCH: "1"
          TESTNET_EXECUTION_ENABLED: "0"
          EXCHANGE_LIVE_TRADING_ENABLED: "0"
        run: python -m pytest

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pytest-autofix-log-${{ github.run_id }}
          path: pytest-autofix.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Comment result
        if: always() && github.event_name == 'issue_comment'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        with:
          script: |
            const changed = '${{ steps.commit.outputs.changed }}' === 'true';
            const conclusion = '${{ job.status }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `AI Autofix finished.\n\n- Target ref: ${{ steps.target.outputs.ref }}\n- Changed files committed: ${changed}\n- Job status: ${conclusion}\n- Check Actions log/artifact: pytest-autofix-log-${{ github.run_id }}`
            });
