name: AI Autofix

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch/ref to fix"
        required: true
        default: "main"
      task:
        description: "Task for AI autofix"
        required: true
        default: "Run full pytest, fix all failures, preserve safety and compatibility."

permissions:
  contents: write
  actions: read

concurrency:
  group: ai-autofix-${{ inputs.target_ref }}
  cancel-in-progress: false

jobs:
  ai-autofix:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        github.actor == 'samandarsharipov2214'
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 60
    env:
      TARGET_REF: ${{ inputs.target_ref }}

    steps:
      - name: Validate target ref
        shell: bash
        run: |
          set -euo pipefail
          git check-ref-format --branch "${TARGET_REF}" >/dev/null

      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt --quiet; fi
          python -m pip install pytest httpx fastapi uvicorn --quiet

      - name: Run AI autofix loop
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.5' }}
          AI_AUTOFIX_ATTEMPTS: "2"
          AI_AUTOFIX_TASK: ${{ inputs.task }}
          ADMIN_USERNAME: ci-admin
          ADMIN_PASSWORD: ci-test-password
          AUTH_SECRET: ci-test-secret
          SHARIPOVAI_DISABLE_AUTH: "1"
          SHARIPOVAI_DATA_DIR: ${{ github.workspace }}/.ci-data
          EXECUTION_KILL_SWITCH: "1"
          TESTNET_EXECUTION_ENABLED: "0"
          EXCHANGE_LIVE_TRADING_ENABLED: "0"
        run: python scripts/ai_autofix.py
        continue-on-error: true

      - name: Run final pytest before commit
        env:
          ADMIN_USERNAME: ci-admin
          ADMIN_PASSWORD: ci-test-password
          AUTH_SECRET: ci-test-secret
          SHARIPOVAI_DISABLE_AUTH: "1"
          SHARIPOVAI_DATA_DIR: ${{ github.workspace }}/.ci-data
          EXECUTION_KILL_SWITCH: "1"
          TESTNET_EXECUTION_ENABLED: "0"
          EXCHANGE_LIVE_TRADING_ENABLED: "0"
        run: python -m pytest -q --disable-warnings --maxfail=1

      - name: Commit verified AI changes
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "SharipovAI Autofix"
          git config user.email "actions@github.com"
          git status --short
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "fix(ci): AI autofix verified pytest failures"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push verified changes
        if: steps.commit.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push origin "HEAD:${TARGET_REF}"

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-autofix-log-${{ github.run_id }}
          path: pytest-autofix.log
          if-no-files-found: ignore
          retention-days: 7
