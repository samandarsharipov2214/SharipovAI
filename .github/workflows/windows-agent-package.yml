name: Windows Agent Package

on:
  push:
    branches: [main]
    paths:
      - 'scripts/windows/**'
      - 'tools/pc_node_agent.py'
      - 'tools/pc_node_backup.py'
      - 'tools/pc_node_update.py'
      - 'tests/test_pc_node_*.py'
      - 'requirements.txt'
      - '.github/workflows/windows-agent-package.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/windows/**'
      - 'tools/pc_node_agent.py'
      - 'tools/pc_node_backup.py'
      - 'tools/pc_node_update.py'
      - 'tests/test_pc_node_*.py'
      - 'requirements.txt'
      - '.github/workflows/windows-agent-package.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-agent-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-package:
    if: >-
      ${{
        vars.SHARIPOVAI_WINDOWS_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, Windows, X64, sharipovai-windows-ci]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem scripts/windows/*.ps1 | ForEach-Object {
            $tokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $_.FullName,
              [ref]$tokens,
              [ref]$parseErrors
            )
            if ($parseErrors.Count -gt 0) {
              $errors += $parseErrors | ForEach-Object {
                "$($_.Extent.File):$($_.Extent.StartLineNumber):$($_.Extent.StartColumnNumber) $($_.Message)"
              }
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host $_ }
            exit 1
          }
          Write-Host 'PowerShell syntax OK'

      - name: Run PC node tests
        shell: pwsh
        run: |
          python -m pytest -q `
            tests/test_pc_node_backup.py `
            tests/test_pc_node_agent.py `
            tests/test_pc_node_update.py `
            tests/test_pc_node_runtime_scripts.py

      - name: Validate Python syntax
        shell: pwsh
        run: python -m compileall -q .

      - name: Build Windows package
        shell: pwsh
        run: |
          @'
          from __future__ import annotations

          import os
          import zipfile
          from pathlib import Path

          root = Path.cwd().resolve()
          output = root / 'SharipovAI-Windows-Agent.zip'
          excluded_dirs = {
              '.git', '.venv', 'data', 'runtime', '__pycache__',
              '.pytest_cache', '.ci-data', '.mypy_cache', '.ruff_cache',
          }
          excluded_suffixes = {'.pyc', '.pyo'}
          file_count = 0

          if output.exists():
              output.unlink()

          with zipfile.ZipFile(output, 'w', zipfile.ZIP_DEFLATED, allowZip64=True) as archive:
              for current, directories, filenames in os.walk(root):
                  directories[:] = [name for name in directories if name not in excluded_dirs]
                  current_path = Path(current)
                  for filename in filenames:
                      source = current_path / filename
                      if source == output or source.suffix.lower() in excluded_suffixes:
                          continue
                      relative = source.relative_to(root)
                      if any(part in excluded_dirs for part in relative.parts):
                          continue
                      archive.write(source, relative.as_posix())
                      file_count += 1

          if file_count < 20:
              raise RuntimeError(f'package contains too few files: {file_count}')

          with zipfile.ZipFile(output, 'r') as archive:
              broken = archive.testzip()
              if broken is not None:
                  raise RuntimeError(f'corrupt ZIP member: {broken}')

          print(f'Windows package ready: {output.name}; files={file_count}; bytes={output.stat().st_size}')
          '@ | python -
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload verified package
        uses: actions/upload-artifact@v4
        with:
          name: SharipovAI-Windows-Agent
          path: SharipovAI-Windows-Agent.zip
          if-no-files-found: error
          retention-days: 14
