name: Windows Agent Package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run PC node tests
        shell: pwsh
        run: |
          pytest -q tests/test_pc_node_backup.py tests/test_pc_node_agent.py tests/test_pc_node_update.py

      - name: Validate Python syntax
        shell: pwsh
        run: |
          python -m compileall -q .

      - name: Build Windows package
        shell: pwsh
        run: |
          $stage = Join-Path $env:RUNNER_TEMP 'SharipovAI-Windows-Agent'
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          robocopy . $stage /E /XD .git .venv data runtime __pycache__ .pytest_cache /XF *.pyc | Out-Null
          if ($LASTEXITCODE -gt 7) { exit $LASTEXITCODE }
          Compress-Archive -Path (Join-Path $stage '*') -DestinationPath SharipovAI-Windows-Agent.zip -Force

      - name: Upload verified package
        uses: actions/upload-artifact@v4
        with:
          name: SharipovAI-Windows-Agent
          path: SharipovAI-Windows-Agent.zip
          retention-days: 30
