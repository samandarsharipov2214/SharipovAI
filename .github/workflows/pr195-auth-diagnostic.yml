name: PR195 Auth Contract Diagnostic

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr195-auth-diagnostic-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  dashboard-auth-contracts:
    if: >-
      vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 30
    env:
      PYTHONPATH: .
      SHARIPOVAI_DATABASE_REQUIRED: '0'
      EXECUTION_KILL_SWITCH: '1'
      TESTNET_EXECUTION_ENABLED: '0'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      AUTONOMOUS_TESTNET_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
      RUNTIME_FILL_HARVESTER_ENABLED: '0'
      SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED: '0'
      EXCHANGE_MODE: sandbox
      EXCHANGE_BASE_URL: https://api-testnet.bybit.com
      PHASE6_TESTNET_RELEASE_GATE: blocked

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip check

      - name: Run all dashboard tests with real authentication
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python -m pytest dashboard/tests \
            -q --disable-warnings \
            --junitxml=artifacts/pr195-auth-junit.xml \
            2>&1 | tee artifacts/pr195-auth.log

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr195-auth-diagnostic-${{ github.run_id }}
          path: |
            artifacts/pr195-auth.log
            artifacts/pr195-auth-junit.xml
            artifacts/runtime-state-*.json
          if-no-files-found: error
          retention-days: 7

      - name: Preserve truthful result
        if: always()
        shell: bash
        run: |
          test '${{ steps.pytest.outcome }}' = 'success'
