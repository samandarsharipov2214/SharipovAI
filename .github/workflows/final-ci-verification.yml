name: Final CI Verification

on:
  push:
    branches: [main, agent/maximum-velocity-phase1]
    paths:
      - '**/*.py'
      - 'dashboard/static/web2/**'
      - 'docs/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'pyproject.toml'
      - 'CONSTITUTION.md'
      - 'README.md'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'dashboard/static/web2/**'
      - 'docs/**'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'pyproject.toml'
      - 'CONSTITUTION.md'
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: final-ci-verification-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: '1'
  PYTHONDONTWRITEBYTECODE: '1'
  ADMIN_USERNAME: ci-admin
  ADMIN_PASSWORD: ci-test-password
  AUTH_SECRET: ci-test-secret
  SHARIPOVAI_DISABLE_AUTH: '1'
  SHARIPOVAI_DATABASE_REQUIRED: '1'
  MARKET_STREAM_ENABLED: '0'
  AUTONOMOUS_PAPER_ENABLED: '0'
  AUTONOMOUS_TESTNET_ENABLED: '0'
  AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
  TESTNET_EXECUTION_ENABLED: '0'
  FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
  FEATURE_BYBIT_LIVE_EXECUTION: '0'
  FEATURE_BYBIT_TESTNET_EXECUTION: '0'
  RUNTIME_FILL_HARVESTER_ENABLED: '0'
  SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED: '0'
  EXCHANGE_LIVE_TRADING_ENABLED: '0'
  LIVE_EXECUTION_MANUAL_UNLOCK: '0'
  EXECUTION_KILL_SWITCH: '1'
  EXCHANGE_MODE: sandbox
  EXCHANGE_BASE_URL: https://api-testnet.bybit.com
  PHASE6_TESTNET_RELEASE_GATE: blocked

jobs:
  regression-contracts:
    name: regression-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: sqlite:////tmp/sharipovai-final-contracts-${{ github.run_id }}.db
      AUTONOMOUS_PAPER_STATE_FILE: /tmp/sharipovai-final-contracts-paper-${{ github.run_id }}.json
      VIRTUAL_ACCOUNT_STATE_FILE: /tmp/sharipovai-final-contracts-virtual-${{ github.run_id }}.json
      MARKET_STREAM_STATE_FILE: /tmp/sharipovai-final-contracts-market-${{ github.run_id }}.json
      TESTNET_BRIDGE_STATE_FILE: /tmp/sharipovai-final-contracts-bridge-${{ github.run_id }}.json
      EXECUTION_JOURNAL_FILE: /tmp/sharipovai-final-contracts-journal-${{ github.run_id }}.json
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip check

      - name: Compile changed contracts
        run: |
          python -m compileall -q \
            dashboard/final_ci_contracts.py \
            dashboard/__init__.py \
            dashboard/paper_activity_api.py \
            dashboard/tests/test_ai_bots_and_chat.py

      - name: Run regression contracts
        run: |
          python -m pytest \
            tests/test_admin_auth_priority.py \
            dashboard/tests/test_admin_secure_app_roles.py \
            dashboard/tests/test_ai_bots_and_chat.py \
            dashboard/tests/test_paper_activity_dashboard.py \
            tests/test_ci_runtime_state.py \
            tests/test_campaign_operations.py \
            tests/test_campaign_operations_ui.py \
            -q --tb=short

  foundation-guardrails:
    name: foundation-guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: sqlite:////tmp/sharipovai-final-guardrails-${{ github.run_id }}.db
      AUTONOMOUS_PAPER_STATE_FILE: /tmp/sharipovai-final-guardrails-paper-${{ github.run_id }}.json
      VIRTUAL_ACCOUNT_STATE_FILE: /tmp/sharipovai-final-guardrails-virtual-${{ github.run_id }}.json
      MARKET_STREAM_STATE_FILE: /tmp/sharipovai-final-guardrails-market-${{ github.run_id }}.json
      TESTNET_BRIDGE_STATE_FILE: /tmp/sharipovai-final-guardrails-bridge-${{ github.run_id }}.json
      EXECUTION_JOURNAL_FILE: /tmp/sharipovai-final-guardrails-journal-${{ github.run_id }}.json
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip check

      - name: Compile repository
        run: python -m compileall -q .

      - name: Run foundation audits
        run: |
          python scripts/execution_foundation_audit.py
          python scripts/research_foundation_audit.py --json
          python scripts/promotion_foundation_audit.py --json
          python scripts/campaign_foundation_audit.py --json
          python scripts/release_audit.py --json

  full-suite:
    name: full-suite
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DATABASE_URL: sqlite:////tmp/sharipovai-final-full-${{ github.run_id }}.db
      AUTONOMOUS_PAPER_STATE_FILE: /tmp/sharipovai-final-full-paper-${{ github.run_id }}.json
      VIRTUAL_ACCOUNT_STATE_FILE: /tmp/sharipovai-final-full-virtual-${{ github.run_id }}.json
      MARKET_STREAM_STATE_FILE: /tmp/sharipovai-final-full-market-${{ github.run_id }}.json
      TESTNET_BRIDGE_STATE_FILE: /tmp/sharipovai-final-full-bridge-${{ github.run_id }}.json
      EXECUTION_JOURNAL_FILE: /tmp/sharipovai-final-full-journal-${{ github.run_id }}.json
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip check

      - name: Run complete pytest
        run: python -m pytest -q --tb=short
