name: One-time Production Deploy c4b368f290d7

on:
  push:
    branches:
      - ops/deploy-c4b368f290d7

permissions:
  contents: read

concurrency:
  group: production-deploy-c4b368f290d7
  cancel-in-progress: false

jobs:
  deploy-and-verify:
    if: github.repository == 'samandarsharipov2214/SharipovAI'
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 70
    env:
      RELEASE_SHA: c4b368f290d71b6b37a595748722132526705155
      APP_DIR: /opt/sharipovai-repo
      PUBLIC_BASE_URL: https://85-137-88-17.sslip.io
      EVIDENCE_DIR: /tmp/sharipovai-release-c4b368f290d7

    steps:
      - name: Checkout deployment control
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Verify immutable main target
        shell: bash
        run: |
          set -Eeuo pipefail
          remote_sha="$(git ls-remote https://github.com/samandarsharipov2214/SharipovAI.git refs/heads/main | awk '{print $1}')"
          [[ "$remote_sha" == "$RELEASE_SHA" ]]
          printf 'main_sha=%s\n' "$remote_sha"

      - name: Prepare privileged execution and evidence
        shell: bash
        run: |
          set -Eeuo pipefail
          rm -rf "$EVIDENCE_DIR"
          mkdir -p "$EVIDENCE_DIR"
          if [[ "$EUID" -eq 0 ]]; then
            printf 'SUDO_BIN=\n' >> "$GITHUB_ENV"
          elif sudo -n true; then
            printf 'SUDO_BIN=sudo\n' >> "$GITHUB_ENV"
          else
            echo 'Passwordless sudo is required for the production deployment runner.' >&2
            exit 1
          fi

      - name: Deploy main with backup health check and automatic rollback
        shell: bash
        run: |
          set -Eeuo pipefail
          run_privileged() {
            if [[ -n "${SUDO_BIN:-}" ]]; then sudo -n "$@"; else "$@"; fi
          }
          run_privileged env \
            APP_DIR="$APP_DIR" \
            BRANCH=main \
            FETCH_REMOTE=https://github.com/samandarsharipov2214/SharipovAI.git \
            bash "$APP_DIR/deploy/vps/update_from_main.sh" \
            2>&1 | tee "$EVIDENCE_DIR/deploy.log"

      - name: Run exact SHA release preflight
        shell: bash
        run: |
          set -Eeuo pipefail
          run_privileged() {
            if [[ -n "${SUDO_BIN:-}" ]]; then sudo -n "$@"; else "$@"; fi
          }
          [[ "$(git -C "$APP_DIR" rev-parse HEAD)" == "$RELEASE_SHA" ]]
          run_privileged env \
            APP_DIR="$APP_DIR" \
            SHARIPOVAI_EXPECTED_SHA="$RELEASE_SHA" \
            PHASE12_PREFLIGHT_OUTPUT="$EVIDENCE_DIR/phase12-preflight.json" \
            bash "$APP_DIR/deploy/vps/phase12_release_preflight.sh" \
            2>&1 | tee "$EVIDENCE_DIR/preflight.log"

      - name: Run exact SHA post-deploy verification
        shell: bash
        run: |
          set -Eeuo pipefail
          run_privileged() {
            if [[ -n "${SUDO_BIN:-}" ]]; then sudo -n "$@"; else "$@"; fi
          }
          run_privileged env \
            APP_DIR="$APP_DIR" \
            SHARIPOVAI_EXPECTED_SHA="$RELEASE_SHA" \
            PHASE12_VERIFY_OUTPUT="$EVIDENCE_DIR/phase12-post-deploy.json" \
            bash "$APP_DIR/deploy/vps/phase12_post_deploy_verify.sh" \
            2>&1 | tee "$EVIDENCE_DIR/post-deploy.log"

      - name: Verify runtime SHA database and financial locks
        shell: bash
        run: |
          set -Eeuo pipefail
          run_privileged() {
            if [[ -n "${SUDO_BIN:-}" ]]; then sudo -n "$@"; else "$@"; fi
          }
          host_sha="$(git -C "$APP_DIR" rev-parse HEAD)"
          runtime_sha="$(run_privileged docker exec sharipovai printenv SHARIPOVAI_BUILD_SHA)"
          image_sha="$(run_privileged docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' sharipovai)"
          [[ "$host_sha" == "$RELEASE_SHA" ]]
          [[ "$runtime_sha" == "$RELEASE_SHA" ]]
          [[ "$image_sha" == "$RELEASE_SHA" ]]
          printf 'host_sha=%s\nruntime_sha=%s\nimage_sha=%s\n' "$host_sha" "$runtime_sha" "$image_sha" \
            | tee "$EVIDENCE_DIR/provenance.txt"

          run_privileged docker exec -i sharipovai python - <<'PY' | tee "$EVIDENCE_DIR/runtime-safety.json"
          import json
          import os
          from sqlalchemy import inspect, text
          from dashboard.db_saas import engine

          required = {
              "EXECUTION_KILL_SWITCH": "1",
              "EXCHANGE_MODE": "sandbox",
              "EXCHANGE_LIVE_TRADING_ENABLED": "0",
              "FEATURE_BYBIT_LIVE_EXECUTION": "0",
              "TESTNET_EXECUTION_ENABLED": "0",
              "AUTONOMOUS_TESTNET_ENABLED": "0",
              "AUTONOMOUS_TESTNET_BRIDGE_ENABLED": "0",
              "FEATURE_BYBIT_PRIVATE_ORDER_WS": "0",
              "RUNTIME_FILL_HARVESTER_ENABLED": "0",
              "SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED": "0",
              "SHARIPOVAI_DISABLE_AUTH": "0",
              "SHARIPOVAI_DATABASE_REQUIRED": "1",
          }
          actual = {key: os.getenv(key, "0") for key in required}
          mismatches = {
              key: {"expected": expected, "actual": actual[key]}
              for key, expected in required.items()
              if actual[key].strip().lower() != expected
          }
          with engine.connect() as connection:
              connection.execute(text("SELECT 1"))
          tables = set(inspect(engine).get_table_names())
          required_tables = {"saas_users", "saas_subscriptions", "saas_chat_messages"}
          missing_tables = sorted(required_tables - tables)
          report = {
              "status": "ok" if not mismatches and not missing_tables else "blocked",
              "safety_flags": actual,
              "missing_saas_tables": missing_tables,
              "gemini_configured": bool(os.getenv("GEMINI_API_KEY") or os.getenv("GOOGLE_API_KEY")),
              "stripe_configured": bool(os.getenv("STRIPE_SECRET_KEY") and os.getenv("STRIPE_WEBHOOK_SECRET") and os.getenv("STRIPE_MONTHLY_PRICE_ID")),
          }
          print(json.dumps(report, ensure_ascii=False, indent=2, sort_keys=True))
          if report["status"] != "ok":
              raise SystemExit(2)
          PY

      - name: Run runtime foundation audits
        shell: bash
        run: |
          set -Eeuo pipefail
          run_privileged() {
            if [[ -n "${SUDO_BIN:-}" ]]; then sudo -n "$@"; else "$@"; fi
          }
          run_privileged docker exec sharipovai python scripts/execution_foundation_audit.py \
            > "$EVIDENCE_DIR/execution-audit.log"
          run_privileged docker exec sharipovai python scripts/research_foundation_audit.py --json \
            > "$EVIDENCE_DIR/research-audit.json"
          run_privileged docker exec sharipovai python scripts/promotion_foundation_audit.py --json \
            > "$EVIDENCE_DIR/promotion-audit.json"
          run_privileged docker exec sharipovai python scripts/campaign_foundation_audit.py --json \
            > "$EVIDENCE_DIR/campaign-audit.json"
          cat "$EVIDENCE_DIR/execution-audit.log"
          cat "$EVIDENCE_DIR/research-audit.json"
          cat "$EVIDENCE_DIR/promotion-audit.json"
          cat "$EVIDENCE_DIR/campaign-audit.json"

      - name: Smoke test local and public application
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --max-time 10 \
            http://127.0.0.1:8000/health > "$EVIDENCE_DIR/local-health.json"
          curl --fail --silent --show-error --max-time 15 \
            "$PUBLIC_BASE_URL/health" > "$EVIDENCE_DIR/public-health.json"
          curl --fail --silent --show-error --max-time 10 \
            http://127.0.0.1:8000/api/auth/me > "$EVIDENCE_DIR/auth-me.json"
          python - "$EVIDENCE_DIR/auth-me.json" <<'PY'
          import json, sys
          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload.get("authenticated") is False, payload
          PY

          protected_code="$(curl --silent --show-error --max-time 10 \
            -o "$EVIDENCE_DIR/protected-api.json" -w '%{http_code}' \
            http://127.0.0.1:8000/api/production/phase11/overview)"
          [[ "$protected_code" == "401" ]]
          printf 'protected_api_status=%s\n' "$protected_code" > "$EVIDENCE_DIR/http-status.txt"

          login_code="$(curl --silent --show-error --max-time 15 \
            -o "$EVIDENCE_DIR/login.html" -w '%{http_code}' \
            "$PUBLIC_BASE_URL/login)"
          [[ "$login_code" == "200" ]]
          printf 'login_status=%s\n' "$login_code" >> "$EVIDENCE_DIR/http-status.txt"

          market_code=000
          for attempt in 1 2 3; do
            market_code="$(curl --silent --show-error --max-time 20 \
              -o "$EVIDENCE_DIR/market-overview.json" -w '%{http_code}' \
              http://127.0.0.1:8000/api/markets/overview || true)"
            [[ "$market_code" == "200" ]] && break
            sleep 3
          done
          printf 'market_overview_status=%s\n' "$market_code" >> "$EVIDENCE_DIR/http-status.txt"
          if [[ "$market_code" == "200" ]]; then
            python - "$EVIDENCE_DIR/market-overview.json" <<'PY'
          import json, sys
          payload = json.load(open(sys.argv[1], encoding="utf-8"))
          assert payload.get("status") == "ok", payload
          assert isinstance(payload.get("markets"), list), payload
          PY
          else
            echo 'CoinGecko market overview is unavailable; recorded as an external dependency warning.' \
              | tee "$EVIDENCE_DIR/market-warning.txt"
          fi

      - name: Controlled container restart crash test
        shell: bash
        run: |
          set -Eeuo pipefail
          run_privileged() {
            if [[ -n "${SUDO_BIN:-}" ]]; then sudo -n "$@"; else "$@"; fi
          }
          run_privileged docker restart sharipovai | tee "$EVIDENCE_DIR/restart.log"
          healthy=0
          for attempt in $(seq 1 35); do
            if curl --fail --silent --show-error --max-time 5 \
              http://127.0.0.1:8000/health >/dev/null; then
              healthy=1
              break
            fi
            sleep 2
          done
          [[ "$healthy" == "1" ]]
          [[ "$(run_privileged docker exec sharipovai printenv SHARIPOVAI_BUILD_SHA)" == "$RELEASE_SHA" ]]
          [[ "$(run_privileged docker exec sharipovai printenv EXECUTION_KILL_SWITCH)" == "1" ]]
          curl --fail --silent --show-error --max-time 15 \
            "$PUBLIC_BASE_URL/health" > "$EVIDENCE_DIR/public-health-after-restart.json"

      - name: Write verification summary
        if: always()
        shell: bash
        run: |
          {
            echo '## SharipovAI release verification'
            echo
            echo "- Release SHA: \`$RELEASE_SHA\`"
            echo '- Deployment: update script with backup and automatic rollback'
            echo '- Provenance: host, container and OCI image SHA checked'
            echo '- Safety: kill switch on; Testnet and Live execution off'
            echo '- Runtime: database, SaaS tables, auth boundary and public health checked'
            echo '- Crash test: controlled container restart and recovery checked'
            if [[ -f "$EVIDENCE_DIR/market-warning.txt" ]]; then
              echo '- Market API: external dependency warning recorded'
            else
              echo '- Market API: reachable'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload production verification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: production-release-c4b368f290d7-${{ github.run_id }}
          path: /tmp/sharipovai-release-c4b368f290d7
          if-no-files-found: warn
          retention-days: 30

      - name: Remove temporary evidence
        if: always()
        shell: bash
        run: rm -rf "$EVIDENCE_DIR"
