name: Full Project Audit

on:
  push:
    branches:
      - audit/full-5-phases-20260713
    paths:
      - 'scripts/full_project_audit.py'
      - 'scripts/static_project_audit.py'
      - 'scripts/live_vps_audit.py'
      - '.github/workflows/full-project-audit.yml'
      - 'dashboard/**'
      - 'deploy/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'Dockerfile'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/full_project_audit.py'
      - 'scripts/static_project_audit.py'
      - 'scripts/live_vps_audit.py'
      - '.github/workflows/full-project-audit.yml'
      - 'dashboard/**'
      - 'deploy/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sharipovai-full-audit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static-audit:
    name: Static code, architecture and site audit
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Prepare isolated audit environment
        id: dependencies
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 -m venv .audit-venv
          .audit-venv/bin/python -m pip install --upgrade pip 2>&1 | tee dependency-install.txt
          .audit-venv/bin/pip install -r requirements.txt 2>&1 | tee -a dependency-install.txt
      - name: Run deterministic static audit
        id: static_audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          .audit-venv/bin/python scripts/static_project_audit.py 2>&1 | tee audit-static-console.txt
      - name: Run complete test suite
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          .audit-venv/bin/pytest -q --disable-warnings --maxfail=100 2>&1 | tee pytest-output.txt
      - name: Record step outcomes
        if: always()
        run: |
          printf 'dependencies=%s\nstatic_audit=%s\ntests=%s\n' \
            '${{ steps.dependencies.outcome }}' '${{ steps.static_audit.outcome }}' '${{ steps.tests.outcome }}' \
            > audit-step-outcomes.txt
      - name: Upload static evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sharipovai-static-audit
          path: |
            audit-results/audit-static.json
            audit-results/audit-static.md
            audit-static-console.txt
            pytest-output.txt
            dependency-install.txt
            audit-step-outcomes.txt
          if-no-files-found: warn
          retention-days: 30

  live-vps-audit:
    name: Live VPS, APIs, AI, Bybit and infrastructure audit
    needs: static-audit
    if: always()
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - name: Run authenticated read-only live audit
        id: live_audit
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ENV_FILE=''
          for file in /opt/sharipovai-repo/deploy/vps/.env.vps /opt/SharipovAI/deploy/vps/.env.vps; do
            if [ -r "$file" ]; then ENV_FILE="$file"; break; fi
          done
          python3 scripts/live_vps_audit.py --base-url http://127.0.0.1:8000 --env-file "$ENV_FILE" 2>&1 | tee audit-live-console.txt
      - name: Capture sanitized system evidence
        if: always()
        shell: bash
        run: |
          {
            echo '=== utc ==='; date -u +%FT%TZ
            echo '=== kernel ==='; uname -a
            echo '=== memory ==='; free -h || true
            echo '=== disk ==='; df -h / /opt 2>/dev/null || true
            echo '=== listeners ==='; ss -lnt | grep -E ':(80|443|8000)\b' || true
            echo '=== relevant services ==='; systemctl list-units --type=service --all --no-pager | grep -E 'sharipov|docker|nginx|caddy|actions.runner' || true
            echo '=== containers ==='; docker ps --format '{{.Names}} {{.Status}}' 2>&1 || true
          } > audit-system-evidence.txt
          printf 'live_audit=%s\n' '${{ steps.live_audit.outcome }}' > audit-live-outcome.txt
      - name: Upload live evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sharipovai-live-vps-audit
          path: |
            audit-results/audit-live.json
            audit-results/audit-live.md
            audit-live-console.txt
            audit-system-evidence.txt
            audit-live-outcome.txt
          if-no-files-found: warn
          retention-days: 30
