name: Phase 13 Trading Execution

on:
  pull_request:
    branches:
      - main
      - feat/sharipovai-saas-foundation
    paths:
      - 'exchange_connector/**'
      - 'autonomous_trading/**'
      - 'trading_core/**'
      - 'validation/**'
      - 'tests/test_execution_contract.py'
      - 'tests/test_execution_idempotency.py'
      - 'tests/test_startup_reconciliation.py'
      - 'tests/test_market_paper_engine.py'
      - 'tests/test_trading_core_backtest.py'
      - 'tests/test_trading_core_funding_walk_forward.py'
      - 'tests/test_benchmark_strategies.py'
      - 'tests/test_fill_divergence_validation.py'
      - 'tests/test_phase13_execution_paper_shadow.py'
      - 'CONSTITUTION.md'
      - 'docs/phase13-trading-execution.md'
      - '.github/workflows/phase13-trading.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase13-trading-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  trading-verification:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 55
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      ADMIN_USERNAME: ci-admin
      ADMIN_PASSWORD: ci-test-password
      AUTH_SECRET: ci-test-secret
      SHARIPOVAI_DISABLE_AUTH: '1'
      DATABASE_URL: sqlite:////tmp/sharipovai-phase13-${{ github.run_id }}.db
      SHARIPOVAI_DATABASE_REQUIRED: '1'
      MARKET_STREAM_ENABLED: '0'
      AUTONOMOUS_PAPER_ENABLED: '0'
      AUTONOMOUS_TESTNET_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      TESTNET_EXECUTION_ENABLED: '0'
      FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
      RUNTIME_FILL_HARVESTER_ENABLED: '0'
      SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED: '0'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      FEATURE_BYBIT_LIVE_EXECUTION: '0'
      FEATURE_BYBIT_TESTNET_EXECUTION: '0'
      EXECUTION_KILL_SWITCH: '1'
      EXCHANGE_MODE: sandbox
      EXCHANGE_BASE_URL: https://api-testnet.bybit.com
      BYBIT_ALLOW_LEGACY_EXCHANGE_CREDENTIALS: '0'
      AUTONOMOUS_TRADING_STAGE: '2'
      EXECUTION_JOURNAL_FILE: /tmp/sharipovai-phase13-journal-${{ github.run_id }}.json
      TESTNET_BRIDGE_STATE_FILE: /tmp/sharipovai-phase13-bridge-${{ github.run_id }}.json

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip install --force-reinstall --no-cache-dir duckdb==1.5.4 --quiet
          python -m pip check

      - name: Compile trading sources
        run: |
          python -m compileall -q \
            exchange_connector \
            autonomous_trading \
            trading_core \
            validation \
            tests/test_phase13_execution_paper_shadow.py

      - name: Prepare evidence
        run: mkdir -p artifacts/phase13

      - name: Focused execution and strategy tests
        id: focused
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            tests/test_execution_contract.py \
            tests/test_execution_idempotency.py \
            tests/test_startup_reconciliation.py \
            tests/test_market_paper_engine.py \
            tests/test_trading_core_backtest.py \
            tests/test_trading_core_funding_walk_forward.py \
            tests/test_benchmark_strategies.py \
            tests/test_fill_divergence_validation.py \
            tests/test_phase13_execution_paper_shadow.py \
            -q --tb=short 2>&1 | tee artifacts/phase13/focused-tests.log

      - name: Full repository test suite
        id: full
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -q --tb=short 2>&1 | tee artifacts/phase13/full-tests.log

      - name: Upload Phase 13 evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase13-trading-evidence-${{ github.run_id }}
          path: artifacts/phase13
          if-no-files-found: error
          retention-days: 14

      - name: Preserve truthful result
        if: always()
        env:
          FOCUSED_OUTCOME: ${{ steps.focused.outcome }}
          FULL_OUTCOME: ${{ steps.full.outcome }}
        shell: bash
        run: |
          set -Eeuo pipefail
          printf 'focused=%s full=%s\n' "$FOCUSED_OUTCOME" "$FULL_OUTCOME"
          [[ "$FOCUSED_OUTCOME" == success ]]
          [[ "$FULL_OUTCOME" == success ]]
