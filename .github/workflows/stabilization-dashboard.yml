name: Dashboard Stabilization

on:
  push:
    branches:
      - stabilization/dashboard-runtime-v2
  pull_request:
    branches:
      - main
    paths:
      - 'dashboard/**'
      - 'agent_health.py'
      - 'learning_engine/**'
      - 'runner/**'
      - 'telegram_bot.py'
      - '.github/workflows/stabilization-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  targeted-dashboard-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements.txt

      - name: Compile dashboard imports
        run: |
          python -m compileall -q dashboard agent_health.py
          python - <<'PY'
          import agent_health
          from dashboard.app import create_app
          app = create_app()
          print('IMPORT_OK', app.title)
          PY

      - name: Run targeted stabilization tests
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          python -m pytest \
            dashboard/tests/test_canonical_agent_health.py \
            dashboard/tests/test_auth_security_flow.py \
            dashboard/tests/test_crash_hardening.py \
            dashboard/tests/test_dashboard.py \
            dashboard/tests/test_demo_api.py \
            -q --tb=short > pytest-targeted.log 2>&1

      - name: Build compact failure report
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('pytest-targeted.log')
          lines = source.read_text(encoding='utf-8', errors='replace').splitlines() if source.exists() else ['pytest log missing']
          markers = ('ERROR collecting', 'FAILED ', 'E   ', 'short test summary', 'ModuleNotFoundError', 'ImportError', 'SyntaxError', 'TypeError', 'AssertionError')
          selected = []
          for index, line in enumerate(lines):
              if any(marker in line for marker in markers):
                  selected.extend(lines[max(0, index - 4):min(len(lines), index + 14)])
          selected.extend(lines[-100:])
          compact = []
          seen = set()
          for line in selected:
              if line not in seen:
                  seen.add(line)
                  compact.append(line)
          report = '\n'.join(compact[-240:])
          Path('pytest-summary.txt').write_text(report, encoding='utf-8')
          print(report)
          PY

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-pytest-report
          path: |
            pytest-targeted.log
            pytest-summary.txt
          if-no-files-found: error

      - name: Fail job when tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1

  print-dashboard-failures:
    if: always()
    needs: targeted-dashboard-tests
    runs-on: ubuntu-latest
    steps:
      - name: Download pytest report
        uses: actions/download-artifact@v4
        with:
          name: dashboard-pytest-report

      - name: Exact dashboard failure summary
        run: cat pytest-summary.txt

      - name: Preserve failure status
        if: needs.targeted-dashboard-tests.result != 'success'
        run: exit 1
