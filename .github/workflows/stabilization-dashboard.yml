name: Dashboard Stabilization

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'agent_health.py'
      - 'learning_engine/**'
      - 'runner/**'
      - 'telegram_bot.py'
      - '.github/workflows/stabilization-dashboard.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'agent_health.py'
      - 'learning_engine/**'
      - 'runner/**'
      - 'telegram_bot.py'
      - '.github/workflows/stabilization-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dashboard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  targeted-dashboard-tests:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet

      - name: Compile dashboard imports
        run: |
          set -o pipefail
          python -m compileall -q dashboard agent_health.py 2>&1 | tee dashboard-import-diagnostic.txt
          python - <<'PY' 2>&1 | tee -a dashboard-import-diagnostic.txt
          import agent_health
          from dashboard.app import create_app
          app = create_app()
          print('IMPORT_OK', app.title)
          PY

      - name: Run targeted stabilization tests
        run: |
          set -o pipefail
          python -m pytest \
            dashboard/tests/test_admin_secure_app_roles.py \
            dashboard/tests/test_password_change_flow.py \
            dashboard/tests/test_canonical_agent_health.py \
            dashboard/tests/test_auth_security_flow.py \
            dashboard/tests/test_crash_hardening.py \
            dashboard/tests/test_dashboard.py \
            dashboard/tests/test_demo_api.py \
            -q --tb=short 2>&1 | tee dashboard-tests.log

      - name: Upload dashboard diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-stabilization-diagnostic
          path: |
            dashboard-import-diagnostic.txt
            dashboard-tests.log
          if-no-files-found: warn
          retention-days: 3
