name: Dashboard Stabilization

on:
  push:
    branches: [main, agent/maximum-velocity-phase1]
    paths:
      - 'dashboard/**'
      - 'experiments/**'
      - 'validation/**'
      - 'exchange_connector/private_ws_gate.py'
      - 'agent_health.py'
      - 'learning_engine/**'
      - 'runner/**'
      - 'telegram_bot.py'
      - 'tests/test_sensitive_api_admin_guard.py'
      - 'tests/test_experiment_dashboard.py'
      - '.github/workflows/stabilization-dashboard.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'experiments/**'
      - 'validation/**'
      - 'exchange_connector/private_ws_gate.py'
      - 'agent_health.py'
      - 'learning_engine/**'
      - 'runner/**'
      - 'telegram_bot.py'
      - 'tests/test_sensitive_api_admin_guard.py'
      - 'tests/test_experiment_dashboard.py'
      - '.github/workflows/stabilization-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dashboard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  targeted-dashboard-tests:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 25
    env:
      DATABASE_URL: sqlite:////tmp/sharipovai-dashboard-${{ github.run_id }}.db
      EXECUTION_JOURNAL_FILE: /tmp/sharipovai-dashboard-journal-${{ github.run_id }}.json
      EXECUTION_KILL_SWITCH: '1'
      TESTNET_EXECUTION_ENABLED: '0'
      FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      EXCHANGE_MODE: sandbox
      MARKET_STREAM_ENABLED: '0'
      AUTONOMOUS_PAPER_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet
          python -m pip check

      - name: Compile dashboard imports
        run: |
          python -m compileall -q dashboard experiments validation agent_health.py
          python - <<'PY'
          import agent_health
          import experiments
          import validation
          from dashboard.app import create_app
          app = create_app()
          assert experiments.ExperimentRegistry is not None
          assert validation.FillDivergenceAnalyzer is not None
          print('IMPORT_OK', app.title)
          PY

      - name: Run targeted stabilization tests
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            dashboard/tests/test_admin_secure_app_roles.py \
            dashboard/tests/test_password_change_flow.py \
            dashboard/tests/test_canonical_agent_health.py \
            dashboard/tests/test_auth_security_flow.py \
            dashboard/tests/test_crash_hardening.py \
            dashboard/tests/test_dashboard.py \
            dashboard/tests/test_demo_api.py \
            tests/test_sensitive_api_admin_guard.py \
            tests/test_experiment_dashboard.py \
            -q --tb=short 2>&1 | tee pytest-targeted.log

      - name: Build compact failure report
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('pytest-targeted.log')
          lines = source.read_text(encoding='utf-8', errors='replace').splitlines() if source.exists() else ['pytest log missing']
          markers = (
            'ERROR collecting', 'FAILED ', 'E   ', 'short test summary',
            'ModuleNotFoundError', 'ImportError', 'SyntaxError', 'TypeError',
            'AssertionError', 'AttributeError', 'KeyError', 'RuntimeError',
          )
          selected = []
          for index, line in enumerate(lines):
              if any(marker in line for marker in markers):
                  selected.extend(lines[max(0, index - 4):min(len(lines), index + 14)])
          selected.extend(lines[-120:])
          compact = []
          seen = set()
          for line in selected:
              if line not in seen:
                  seen.add(line)
                  compact.append(line)
          report = '\n'.join(compact[-300:])
          Path('pytest-targeted-summary.txt').write_text(report, encoding='utf-8')
          print(report)
          PY

      - name: Upload targeted pytest diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dashboard-targeted-diagnostics-${{ github.run_id }}
          path: |
            pytest-targeted.log
            pytest-targeted-summary.txt
          if-no-files-found: error
          retention-days: 7

      - name: Fail when targeted tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1
