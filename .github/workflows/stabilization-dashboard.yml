name: Dashboard Stabilization

on:
  push:
    branches:
      - stabilization/dashboard-runtime-v2
  pull_request:
    branches:
      - main
    paths:
      - 'dashboard/**'
      - 'agent_health.py'
      - 'learning_engine/**'
      - 'runner/**'
      - 'telegram_bot.py'
      - '.github/workflows/stabilization-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  targeted-dashboard-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements.txt

      - name: Compile dashboard imports
        run: |
          python -m compileall -q dashboard agent_health.py
          python - <<'PY'
          import agent_health
          from dashboard.app import create_app
          app = create_app()
          print('IMPORT_OK', app.title)
          PY

      - name: Diagnose access-request routing
        run: |
          python - <<'PY'
          import os
          import tempfile
          from pathlib import Path
          from fastapi.testclient import TestClient
          from dashboard.app import create_app

          with tempfile.TemporaryDirectory() as directory:
              root = Path(directory)
              os.environ['AUTH_ACCESS_REQUESTS_FILE'] = str(root / 'access_requests.json')
              os.environ['AUTH_SECURITY_EVENTS_FILE'] = str(root / 'security_events.jsonl')
              os.environ.pop('SHARIPOVAI_DISABLE_AUTH', None)
              app = create_app()
              client = TestClient(app)
              register = client.post('/register', data={
                  'username': 'diagnostic_user',
                  'contact': '@diagnostic',
                  'reason': 'route diagnostic',
              })
              access = client.get('/api/security/access-requests')
              lines = [
                  f"RENDER={os.getenv('RENDER')!r}",
                  f"ENVIRONMENT={os.getenv('ENVIRONMENT')!r}",
                  f"AUTH_ACCESS_REQUESTS_FILE={os.getenv('AUTH_ACCESS_REQUESTS_FILE')!r}",
                  'MIDDLEWARE=' + ','.join(getattr(item.cls, '__name__', str(item.cls)) for item in app.user_middleware),
                  f"REGISTER_STATUS={register.status_code}",
                  f"REGISTER_BODY={register.text}",
                  f"ACCESS_STATUS={access.status_code}",
                  f"ACCESS_BODY={access.text}",
              ]
              Path('access-diagnostic.txt').write_text('\n'.join(lines), encoding='utf-8')
              print('\n'.join(lines))
          PY

      - name: Run targeted stabilization tests
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          python -m pytest \
            dashboard/tests/test_admin_secure_app_roles.py \
            dashboard/tests/test_password_change_flow.py \
            dashboard/tests/test_canonical_agent_health.py \
            dashboard/tests/test_auth_security_flow.py \
            dashboard/tests/test_crash_hardening.py \
            dashboard/tests/test_dashboard.py \
            dashboard/tests/test_demo_api.py \
            -q --tb=short > pytest-targeted.log 2>&1

      - name: Build compact failure report
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('pytest-targeted.log')
          lines = source.read_text(encoding='utf-8', errors='replace').splitlines() if source.exists() else ['pytest log missing']
          markers = ('ERROR collecting', 'FAILED ', 'E   ', 'short test summary', 'ModuleNotFoundError', 'ImportError', 'SyntaxError', 'TypeError', 'AssertionError')
          selected = []
          for index, line in enumerate(lines):
              if any(marker in line for marker in markers):
                  selected.extend(lines[max(0, index - 4):min(len(lines), index + 14)])
          selected.extend(lines[-100:])
          compact = []
          seen = set()
          for line in selected:
              if line not in seen:
                  seen.add(line)
                  compact.append(line)
          report = '\n'.join(compact[-240:])
          Path('pytest-summary.txt').write_text(report, encoding='utf-8')
          print(report)
          PY

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-pytest-report
          path: |
            access-diagnostic.txt
            pytest-targeted.log
            pytest-summary.txt
          if-no-files-found: error

      - name: Fail job when tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1

  print-dashboard-failures:
    if: always()
    needs: targeted-dashboard-tests
    runs-on: ubuntu-latest
    steps:
      - name: Download pytest report
        uses: actions/download-artifact@v4
        with:
          name: dashboard-pytest-report

      - name: Access-request diagnostic
        run: cat access-diagnostic.txt

      - name: Exact dashboard failure summary
        run: cat pytest-summary.txt

      - name: Preserve failure status
        if: needs.targeted-dashboard-tests.result != 'success'
        run: exit 1
