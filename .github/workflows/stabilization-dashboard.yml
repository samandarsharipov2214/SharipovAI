name: Dashboard Stabilization

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'agent_health.py'
      - 'learning_engine/**'
      - 'runner/**'
      - 'telegram_bot.py'
      - 'tests/test_web2_factory_contract.py'
      - '.github/workflows/stabilization-dashboard.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'agent_health.py'
      - 'learning_engine/**'
      - 'runner/**'
      - 'telegram_bot.py'
      - 'tests/test_web2_factory_contract.py'
      - '.github/workflows/stabilization-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dashboard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  targeted-dashboard-tests:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 20
    env:
      SHARIPOVAI_DISABLE_AUTH: '1'
      EXECUTION_KILL_SWITCH: '1'
      TESTNET_EXECUTION_ENABLED: '0'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      EXCHANGE_MODE: sandbox
      ADMIN_USERNAME: ci-admin
      ADMIN_PASSWORD: ci-test-password
      AUTH_SECRET: ci-test-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet

      - name: Compile dashboard imports
        run: |
          python -m compileall -q dashboard agent_health.py
          python - <<'PY'
          import agent_health
          import dashboard
          print('IMPORT_OK', dashboard.app.title)
          PY

      - name: Run targeted stabilization tests
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest \
            dashboard/tests/test_admin_secure_app_roles.py \
            dashboard/tests/test_password_change_flow.py \
            dashboard/tests/test_canonical_agent_health.py \
            dashboard/tests/test_auth_security_flow.py \
            dashboard/tests/test_crash_hardening.py \
            dashboard/tests/test_dashboard.py \
            dashboard/tests/test_demo_api.py \
            tests/test_web2_factory_contract.py \
            tests/test_release_audit.py \
            -q --tb=short 2>&1 | tee pytest-targeted.log

      - name: Build compact failure report
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('pytest-targeted.log')
          lines = source.read_text(encoding='utf-8', errors='replace').splitlines() if source.exists() else ['pytest log missing']
          markers = ('ERROR collecting', 'FAILED ', 'E   ', 'short test summary', 'ModuleNotFoundError', 'ImportError', 'SyntaxError', 'TypeError', 'AssertionError')
          selected = []
          for index, line in enumerate(lines):
              if any(marker in line for marker in markers):
                  selected.extend(lines[max(0, index - 4):min(len(lines), index + 14)])
          selected.extend(lines[-120:])
          compact = []
          seen = set()
          for line in selected:
              if line not in seen:
                  seen.add(line)
                  compact.append(line)
          Path('pytest-summary.txt').write_text('\n'.join(compact[-350:]) + '\n', encoding='utf-8')
          PY

      - name: Upload exact dashboard report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-pytest-report
          path: |
            pytest-targeted.log
            pytest-summary.txt
          if-no-files-found: error
          retention-days: 30

      - name: Fail job when tests failed
        if: steps.pytest.outcome == 'failure'
        run: exit 1
