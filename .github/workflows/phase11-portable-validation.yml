name: Portable Phase 11 Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'audit/**'
      - 'campaigns/**'
      - 'risk/**'
      - 'dashboard/**'
      - 'deploy/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'Dockerfile'
      - 'README.md'
      - 'CONSTITUTION.md'
      - '.github/workflows/phase11-portable-validation.yml'
  push:
    branches: [main]
    paths:
      - 'audit/**'
      - 'campaigns/**'
      - 'risk/**'
      - 'dashboard/**'
      - 'deploy/**'
      - 'scripts/**'
      - 'tests/**'
      - 'requirements*.txt'
      - 'Dockerfile'
      - 'README.md'
      - 'CONSTITUTION.md'
      - '.github/workflows/phase11-portable-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase11-portable-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  portable-cleanroom:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      ADMIN_USERNAME: phase11-portable-admin
      ADMIN_PASSWORD: phase11-portable-password-${{ github.run_id }}
      AUTH_SECRET: phase11-portable-key-${{ github.run_id }}
      SHARIPOVAI_DISABLE_AUTH: '0'
      SHARIPOVAI_DATABASE_REQUIRED: '1'
      DATABASE_URL: sqlite:////tmp/sharipovai-portable-${{ github.run_id }}.db
      EXECUTION_KILL_SWITCH: '1'
      EXCHANGE_MODE: sandbox
      EXCHANGE_BASE_URL: https://api-testnet.bybit.com
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      FEATURE_BYBIT_LIVE_EXECUTION: '0'
      FEATURE_BYBIT_TESTNET_EXECUTION: '0'
      TESTNET_EXECUTION_ENABLED: '0'
      AUTONOMOUS_TESTNET_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      FEATURE_BYBIT_TESTNET: '0'
      FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
      BYBIT_ALLOW_LEGACY_EXCHANGE_CREDENTIALS: '0'
      RUNTIME_FILL_HARVESTER_ENABLED: '0'
      SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED: '0'
      PHASE11_MAX_TESTNET_NOTIONAL_USDT: '50'

    steps:
      - name: Checkout immutable source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install and audit dependencies
        run: |
          set -Eeuo pipefail
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip check
          python -m pip_audit -r requirements.txt --progress-spinner off

      - name: Compile all Python sources
        run: python -m compileall -q .

      - name: Run foundation audits
        run: |
          set -Eeuo pipefail
          python scripts/execution_foundation_audit.py
          python scripts/research_foundation_audit.py --json
          python scripts/promotion_foundation_audit.py --json
          python scripts/campaign_foundation_audit.py --json

      - name: Run portable crash dashboard and launch suite
        run: |
          set -Eeuo pipefail
          python -m pytest \
            tests/test_phase9_results_and_scaling.py \
            tests/test_phase10_controlled_scaling.py \
            tests/test_phase10_capital_engine.py \
            tests/test_phase11_production_audit.py \
            tests/test_phase11_dashboard_contract.py \
            tests/test_phase11_crash_resilience.py \
            tests/test_phase11_security_headers.py \
            tests/test_phase11_launch_preparation.py \
            tests/test_phase11_evidence_handoff.py \
            tests/test_system_health_center.py \
            tests/test_web2_market_chart_contract.py \
            -q --tb=short \
            --junitxml=phase11-portable-junit.xml

      - name: Run deterministic production audit
        run: |
          python - <<'PY'
          import json
          from audit.phase11_production_audit import ProductionAudit

          report = ProductionAudit('.').run()
          with open('phase11-portable-audit.json', 'w', encoding='utf-8') as handle:
              json.dump(report, handle, ensure_ascii=False, indent=2, sort_keys=True, allow_nan=False)
              handle.write('\n')
          print(json.dumps(report, ensure_ascii=False, indent=2, sort_keys=True))
          raise SystemExit(0 if report['status'] == 'ready_for_bounded_testnet_preflight' else 2)
          PY

      - name: Upload portable evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase11-portable-evidence-${{ github.run_id }}
          path: |
            phase11-portable-junit.xml
            phase11-portable-audit.json
          if-no-files-found: warn
          retention-days: 14

      - name: Remove isolated database state
        if: always()
        run: |
          rm -f \
            /tmp/sharipovai-portable-${{ github.run_id }}.db \
            /tmp/sharipovai-portable-${{ github.run_id }}.db-wal \
            /tmp/sharipovai-portable-${{ github.run_id }}.db-shm
