name: PR192 Clean Head Verification

on:
  push:
    branches: [ci/verify-pr192-bfc39534]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr192-clean-head-verification
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: '1'
  PYTHONDONTWRITEBYTECODE: '1'
  ADMIN_USERNAME: ci-admin
  ADMIN_PASSWORD: ci-test-password
  AUTH_SECRET: ci-test-secret
  SHARIPOVAI_DISABLE_AUTH: '1'
  SHARIPOVAI_DATABASE_REQUIRED: '1'
  MARKET_STREAM_ENABLED: '0'
  AUTONOMOUS_PAPER_ENABLED: '0'
  AUTONOMOUS_TESTNET_ENABLED: '0'
  AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
  TESTNET_EXECUTION_ENABLED: '0'
  FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
  FEATURE_BYBIT_LIVE_EXECUTION: '0'
  FEATURE_BYBIT_TESTNET_EXECUTION: '0'
  RUNTIME_FILL_HARVESTER_ENABLED: '0'
  SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED: '0'
  EXCHANGE_LIVE_TRADING_ENABLED: '0'
  LIVE_EXECUTION_MANUAL_UNLOCK: '0'
  EXECUTION_KILL_SWITCH: '1'
  EXCHANGE_MODE: sandbox
  EXCHANGE_BASE_URL: https://api-testnet.bybit.com
  PHASE6_TESTNET_RELEASE_GATE: blocked

jobs:
  targeted-and-guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: sqlite:////tmp/pr192-targeted-${{ github.run_id }}.db
      AUTONOMOUS_PAPER_STATE_FILE: /tmp/pr192-targeted-paper-${{ github.run_id }}.json
      VIRTUAL_ACCOUNT_STATE_FILE: /tmp/pr192-targeted-virtual-${{ github.run_id }}.json
      MARKET_STREAM_STATE_FILE: /tmp/pr192-targeted-market-${{ github.run_id }}.json
      TESTNET_BRIDGE_STATE_FILE: /tmp/pr192-targeted-bridge-${{ github.run_id }}.json
      EXECUTION_JOURNAL_FILE: /tmp/pr192-targeted-journal-${{ github.run_id }}.json
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: bfc39534b4c684b9cbd32d69e27271291dc7d9ec
          persist-credentials: false

      - name: Verify checked out SHA
        run: test "$(git rev-parse HEAD)" = "bfc39534b4c684b9cbd32d69e27271291dc7d9ec"

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip check

      - name: Compile and audit
        run: |
          python -m compileall -q .
          python scripts/execution_foundation_audit.py
          python scripts/research_foundation_audit.py --json
          python scripts/promotion_foundation_audit.py --json
          python scripts/campaign_foundation_audit.py --json
          python scripts/release_audit.py --json

      - name: Run final targeted contracts
        run: |
          python -m pytest \
            tests/test_ci_self_hosted_contracts.py \
            tests/test_admin_auth_priority.py \
            dashboard/tests/test_admin_secure_app_roles.py \
            dashboard/tests/test_ai_bots_and_chat.py \
            dashboard/tests/test_paper_activity_dashboard.py \
            tests/test_ci_runtime_state.py \
            tests/test_campaign_operations.py \
            tests/test_campaign_operations_ui.py \
            -q --tb=short

  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DATABASE_URL: sqlite:////tmp/pr192-full-${{ github.run_id }}.db
      AUTONOMOUS_PAPER_STATE_FILE: /tmp/pr192-full-paper-${{ github.run_id }}.json
      VIRTUAL_ACCOUNT_STATE_FILE: /tmp/pr192-full-virtual-${{ github.run_id }}.json
      MARKET_STREAM_STATE_FILE: /tmp/pr192-full-market-${{ github.run_id }}.json
      TESTNET_BRIDGE_STATE_FILE: /tmp/pr192-full-bridge-${{ github.run_id }}.json
      EXECUTION_JOURNAL_FILE: /tmp/pr192-full-journal-${{ github.run_id }}.json
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: bfc39534b4c684b9cbd32d69e27271291dc7d9ec
          persist-credentials: false

      - name: Verify checked out SHA
        run: test "$(git rev-parse HEAD)" = "bfc39534b4c684b9cbd32d69e27271291dc7d9ec"

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip check

      - name: Run complete pytest
        shell: bash
        run: |
          mkdir -p artifacts
          set +e
          python -m pytest -q --tb=short \
            --junitxml=artifacts/full-suite.xml \
            2>&1 | tee artifacts/full-suite.log
          status=${PIPESTATUS[0]}
          echo "${status}" > artifacts/exit-code.txt
          exit "${status}"

      - name: Upload full-suite evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr192-clean-head-full-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 14
