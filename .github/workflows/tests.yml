name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx fastapi uvicorn

      - name: Run tests
        env:
          ADMIN_USERNAME: Samandar2212
          ADMIN_PASSWORD: ci-test-password
          AUTH_SECRET: ci-test-secret
          SHARIPOVAI_DISABLE_AUTH: "1"
        run: python -m pytest
