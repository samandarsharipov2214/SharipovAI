name: Tests

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      ADMIN_USERNAME: ci-admin
      ADMIN_PASSWORD: ci-test-password
      AUTH_SECRET: ci-test-secret
      SHARIPOVAI_DISABLE_AUTH: '1'
      MARKET_STREAM_ENABLED: '0'
      AUTONOMOUS_PAPER_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      EXECUTION_KILL_SWITCH: '1'
      TESTNET_EXECUTION_ENABLED: '0'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      EXCHANGE_MODE: sandbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Prepare isolated runtime state
        shell: bash
        run: |
          set -Eeuo pipefail
          RUNTIME_DIR="${RUNNER_TEMP}/sharipovai-tests-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "$RUNTIME_DIR"
          mkdir -p "$RUNTIME_DIR"
          {
            echo "SHARIPOVAI_DATA_DIR=$RUNTIME_DIR"
            echo "DATABASE_URL=sqlite:///$RUNTIME_DIR/sharipovai.db"
            echo "AUTONOMOUS_PAPER_STATE_FILE=$RUNTIME_DIR/autonomous-paper.json"
            echo "MARKET_STREAM_STATE_FILE=$RUNTIME_DIR/market-stream.json"
            echo "TESTNET_BRIDGE_STATE_FILE=$RUNTIME_DIR/testnet-bridge.json"
            echo "EXECUTION_JOURNAL_FILE=$RUNTIME_DIR/execution-journal.json"
            echo "AUTH_USERS_FILE=$RUNTIME_DIR/users.json"
            echo "AUTH_ACCESS_REQUESTS_FILE=$RUNTIME_DIR/access-requests.json"
            echo "AUTH_SECURITY_EVENTS_FILE=$RUNTIME_DIR/security-events.json"
            echo "AUTH_LOGIN_ATTEMPTS_FILE=$RUNTIME_DIR/login-attempts.json"
            echo "NEWS_MONITOR_STATE_FILE=$RUNTIME_DIR/news-monitor.json"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Import application safely
        run: |
          python -c "import dashboard; assert dashboard.app is not None; print('dashboard import: ok')"

      - name: Verify execution safety defaults
        run: |
          python - <<'PY'
          from exchange_connector.bybit_execution import BybitExecutionClient
          status = BybitExecutionClient().status()
          assert status['live_execution_enabled'] is False
          assert status['testnet_execution_enabled'] is False
          assert status['kill_switch'] is True
          print('execution safety gates: ok')
          PY

      - name: Run test suite
        run: python -m pytest -q --disable-warnings --maxfail=1
