name: Tests

on:
  push:
    branches: [main, agent/maximum-velocity-phase1]
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'pyproject.toml'
      - 'CONSTITUTION.md'
      - 'README.md'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'pyproject.toml'
      - 'CONSTITUTION.md'
      - 'README.md'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 50
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      ADMIN_USERNAME: ci-admin
      ADMIN_PASSWORD: ci-test-password
      AUTH_SECRET: ci-test-secret
      SHARIPOVAI_DISABLE_AUTH: '1'
      DATABASE_URL: sqlite:////tmp/sharipovai-ci-${{ github.run_id }}.db
      MARKET_STREAM_ENABLED: '0'
      AUTONOMOUS_PAPER_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      AUTONOMOUS_TESTNET_ENABLED: '0'
      TESTNET_EXECUTION_ENABLED: '0'
      FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
      RUNTIME_FILL_HARVESTER_ENABLED: '0'
      SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED: '0'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      LIVE_EXECUTION_MANUAL_UNLOCK: '0'
      LIVE_EXECUTION_CONFIRMATION: ''
      EXECUTION_KILL_SWITCH: '1'
      EXCHANGE_MODE: sandbox
      EXCHANGE_BASE_URL: https://api-testnet.bybit.com
      AUTONOMOUS_PAPER_STATE_FILE: /tmp/sharipovai-autonomous-paper-${{ github.run_id }}.json
      VIRTUAL_ACCOUNT_STATE_FILE: /tmp/sharipovai-virtual-account-${{ github.run_id }}.json
      MARKET_STREAM_STATE_FILE: /tmp/sharipovai-market-stream-${{ github.run_id }}.json
      TESTNET_BRIDGE_STATE_FILE: /tmp/sharipovai-testnet-bridge-${{ github.run_id }}.json
      EXECUTION_JOURNAL_FILE: /tmp/sharipovai-execution-journal-${{ github.run_id }}.json

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip install --force-reinstall --no-cache-dir duckdb==1.5.4 --quiet
          python -m pip check
          python - <<'PY'
          import duckdb
          assert duckdb.__version__ == '1.5.4'
          print('duckdb wheel:', duckdb.__version__)
          PY

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt --progress-spinner off

      - name: Compile all Python sources
        run: python -m compileall -q .

      - name: Import critical runtime safely
        run: |
          python - <<'PY'
          import campaigns
          import dashboard
          import experiments
          import historical_data
          import observability
          import trading_core
          import validation
          from autonomous_trading import ShadowModeTestnetBridge, StartupExecutionReconciler
          from exchange_connector import (
              ApprovedExecutionRequest,
              BybitExecutionStateStore,
              BybitTradingReferenceClient,
              ExecutionIdempotencyRepository,
              PrivateStreamHealthRepository,
          )
          from risk_engine import RiskLimits
          assert dashboard.app is not None
          assert campaigns.ScheduledCampaignOrchestrator is not None
          assert campaigns.TestnetShadowCampaign is not None
          assert campaigns.FinalPromotionReportEngine is not None
          assert trading_core.EventDrivenBacktester is not None
          assert trading_core.WalkForwardBacktester is not None
          assert historical_data.HistoricalDataLoader is not None
          assert observability.JsonFormatter is not None
          assert experiments.ExperimentRegistry is not None
          assert experiments.AutomaticExperimentRunner is not None
          assert experiments.ChampionChallengerRegistry is not None
          assert experiments.PromotionGateEngine is not None
          assert validation.FillDivergenceAnalyzer is not None
          assert validation.RuntimeFillHarvester is not None
          assert StartupExecutionReconciler is not None
          assert ShadowModeTestnetBridge is not None
          assert ApprovedExecutionRequest is not None
          assert BybitExecutionStateStore is not None
          assert BybitTradingReferenceClient is not None
          assert ExecutionIdempotencyRepository is not None
          assert PrivateStreamHealthRepository is not None
          assert RiskLimits is not None
          print('critical imports: ok')
          PY

      - name: Verify hard execution locks
        run: |
          python - <<'PY'
          import os
          from exchange_connector.bybit_execution import BybitExecutionClient
          from exchange_connector.execution_contract import MAINNET_EXECUTION_COMPILED

          assert MAINNET_EXECUTION_COMPILED is False
          status = BybitExecutionClient().status()
          assert status['live_execution_enabled'] is False
          assert status['mainnet_execution_compiled'] is False
          assert status['mainnet_hard_blocked'] is True
          assert status['testnet_execution_enabled'] is False
          assert status['kill_switch'] is True

          os.environ['EXCHANGE_MODE'] = 'live'
          os.environ['EXCHANGE_BASE_URL'] = 'https://api.bybit.com'
          os.environ['EXCHANGE_LIVE_TRADING_ENABLED'] = '1'
          os.environ['LIVE_EXECUTION_MANUAL_UNLOCK'] = '1'
          os.environ['LIVE_EXECUTION_CONFIRMATION'] = 'I_ACCEPT_REAL_FINANCIAL_RISK'
          os.environ['EXECUTION_KILL_SWITCH'] = '0'
          live_status = BybitExecutionClient().status()
          assert live_status['live_execution_enabled'] is False
          assert live_status['mainnet_hard_blocked'] is True
          print('execution safety gates: hard-locked')
          PY

      - name: Audit research foundation
        id: research_audit
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/research_foundation_audit.py --json \
            2>&1 | tee artifacts/research-audit.json

      - name: Audit scheduled shadow campaign foundation
        id: campaign_audit
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/campaign_foundation_audit.py --json \
            2>&1 | tee artifacts/campaign-audit.json

      - name: Run Phase 5 scheduled campaign regressions
        id: phase5_suite
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python -m pytest \
            tests/test_bybit_execution_state.py \
            tests/test_private_execution_ws.py \
            tests/test_private_order_ws_v3.py \
            tests/test_runtime_fill_harvester.py \
            tests/test_scheduled_campaign_orchestrator.py \
            tests/test_final_promotion_report.py \
            tests/test_leadership_dashboard.py \
            tests/test_shadow_mode.py \
            -q --tb=short \
            2>&1 | tee artifacts/phase5-suite.log

      - name: Run critical safety and research suite with coverage
        id: critical_suite
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python -m pytest \
            tests/test_historical_data_layer.py \
            tests/test_automatic_experiment_runner.py \
            tests/test_experiment_registry_promotion.py \
            tests/test_champion_challenger_registry.py \
            tests/test_leadership_dashboard.py \
            tests/test_experiment_dashboard.py \
            tests/test_observability.py \
            tests/test_execution_status_router.py \
            tests/test_execution_contract.py \
            tests/test_execution_idempotency.py \
            tests/test_startup_reconciliation.py \
            tests/test_private_ws_startup_gate.py \
            tests/test_private_execution_ws.py \
            tests/test_testnet_bridge_canonical_candidate.py \
            tests/test_bybit_reference_data.py \
            tests/test_bybit_execution_state.py \
            tests/test_shadow_mode.py \
            tests/test_runtime_fill_harvester.py \
            tests/test_scheduled_campaign_orchestrator.py \
            tests/test_final_promotion_report.py \
            tests/test_risk_hard_limits.py \
            tests/test_capital_allocation.py \
            tests/test_trading_core_backtest.py \
            tests/test_trading_core_funding_walk_forward.py \
            tests/test_benchmark_strategies.py \
            tests/test_fill_divergence_validation.py \
            tests/test_market_paper_engine.py \
            tests/test_paper_state_recovery.py \
            tests/test_project_change_ledger.py \
            risk_engine/tests/test_risk_engine.py \
            --cov=exchange_connector.execution_contract \
            --cov=exchange_connector.execution_idempotency \
            --cov=exchange_connector.bybit_execution \
            --cov=exchange_connector.bybit_execution_state \
            --cov=exchange_connector.bybit_reference_data \
            --cov=exchange_connector.private_ws_gate \
            --cov=autonomous_trading.shadow_mode \
            --cov=autonomous_trading.startup_reconciliation \
            --cov=risk_engine \
            --cov=capital_allocation \
            --cov=trading_core \
            --cov=historical_data \
            --cov=experiments \
            --cov=validation \
            --cov=observability \
            --cov=dashboard.routers.execution_status \
            --cov=dashboard.routers.experiments \
            --cov=dashboard.routers.leadership \
            --cov-report=term-missing \
            --cov-report=xml:artifacts/coverage.xml \
            --cov-fail-under=65 \
            -q --tb=short \
            2>&1 | tee artifacts/critical-suite.log

      - name: Run complete pytest suite
        id: full_suite
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          python -m pytest -q --tb=short \
            --junitxml=artifacts/pytest.xml \
            > artifacts/pytest-full.log 2>&1

      - name: Build compact failure report
        if: always()
        run: |
          mkdir -p artifacts
          python - <<'PY'
          from pathlib import Path
          sources = [
              Path('artifacts/research-audit.json'),
              Path('artifacts/campaign-audit.json'),
              Path('artifacts/phase5-suite.log'),
              Path('artifacts/critical-suite.log'),
              Path('artifacts/pytest-full.log'),
          ]
          lines = []
          for source in sources:
              lines.append(f'===== {source.name} =====')
              lines.extend(source.read_text(encoding='utf-8', errors='replace').splitlines() if source.exists() else ['log missing'])
          markers = ('"passed": false', '"status": "blocked"', 'ERROR collecting', 'FAILED ', 'E   ', 'short test summary', 'ModuleNotFoundError', 'ImportError', 'SyntaxError', 'TypeError', 'AssertionError', 'coverage failure')
          selected = []
          for index, line in enumerate(lines):
              if any(marker in line for marker in markers):
                  selected.extend(lines[max(0, index - 4):min(len(lines), index + 14)])
          selected.extend(lines[-200:])
          compact = []
          seen = set()
          for line in selected:
              if line not in seen:
                  seen.add(line)
                  compact.append(line)
          report = '\n'.join(compact[-500:])
          Path('artifacts/pytest-summary.txt').write_text(report, encoding='utf-8')
          print(report)
          PY

      - name: Upload test and coverage evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase5-scheduled-campaign-evidence-${{ github.run_id }}
          path: |
            artifacts/research-audit.json
            artifacts/campaign-audit.json
            artifacts/phase5-suite.log
            artifacts/critical-suite.log
            artifacts/pytest.xml
            artifacts/pytest-full.log
            artifacts/pytest-summary.txt
            artifacts/coverage.xml
          if-no-files-found: warn
          retention-days: 14

      - name: Preserve truthful failure status
        if: steps.research_audit.outcome == 'failure' || steps.campaign_audit.outcome == 'failure' || steps.phase5_suite.outcome == 'failure' || steps.critical_suite.outcome == 'failure' || steps.full_suite.outcome == 'failure'
        run: |
          cat artifacts/pytest-summary.txt
          exit 1
