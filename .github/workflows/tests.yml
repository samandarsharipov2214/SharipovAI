name: Tests

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - 'requirements.txt'
      - '.github/workflows/tests.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 20
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      ADMIN_USERNAME: ci-admin
      ADMIN_PASSWORD: ci-test-password
      AUTH_SECRET: ci-test-secret
      SHARIPOVAI_DISABLE_AUTH: '1'
      MARKET_STREAM_ENABLED: '0'
      AUTONOMOUS_PAPER_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      AUTONOMOUS_PAPER_STATE_FILE: /tmp/sharipovai-autonomous-paper.json
      MARKET_STREAM_STATE_FILE: /tmp/sharipovai-market-stream.json
      TESTNET_BRIDGE_STATE_FILE: /tmp/sharipovai-testnet-bridge.json
      EXECUTION_JOURNAL_FILE: /tmp/sharipovai-execution-journal.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet

      - name: Compile Python sources
        run: python -m compileall -q .

      - name: Import application safely
        run: python scripts/ci_import_probe.py

      - name: Upload import diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: application-import-diagnostic
          path: ci-import-diagnostic.txt
          if-no-files-found: error
          retention-days: 3

      - name: Verify execution safety defaults
        env:
          AUTONOMOUS_TESTNET_ENABLED: '0'
          TESTNET_EXECUTION_ENABLED: '0'
          EXCHANGE_LIVE_TRADING_ENABLED: '0'
          EXECUTION_KILL_SWITCH: '1'
          EXCHANGE_MODE: sandbox
        run: |
          python - <<'PY'
          from exchange_connector.bybit_execution import BybitExecutionClient
          status = BybitExecutionClient().status()
          assert status['live_execution_enabled'] is False
          assert status['testnet_execution_enabled'] is False
          assert status['kill_switch'] is True
          print('execution safety gates: ok')
          PY

      - name: Run test suite
        run: |
          set -o pipefail
          python -m pytest -q --disable-warnings --maxfail=1 2>&1 | tee tests-pytest.log

      - name: Upload pytest diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tests-pytest-failure-log
          path: tests-pytest.log
          if-no-files-found: error
          retention-days: 3
