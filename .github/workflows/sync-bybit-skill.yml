name: Sync official Bybit trading skill

on:
  push:
    branches:
      - feat/bybit-trading-skill
    paths:
      - .github/workflows/sync-bybit-skill.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/bybit-trading-skill
          fetch-depth: 0

      - name: Download and verify official Bybit skill
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import pathlib
          import re
          import urllib.request

          user_agent = "bybit-skill/1.5.3 SharipovAI"
          manifest_url = "https://api.bybit.com/skill/manifest"
          source_url = "https://raw.githubusercontent.com/bybit-exchange/skills/main/SKILL.md"
          target = pathlib.Path("skills/bybit-trading/SKILL.md")
          metadata_target = pathlib.Path("skills/bybit-trading/SOURCE.json")

          def fetch(url: str) -> bytes:
              request = urllib.request.Request(url, headers={"User-Agent": user_agent})
              with urllib.request.urlopen(request, timeout=30) as response:
                  return response.read()

          manifest = json.loads(fetch(manifest_url).decode("utf-8"))
          version = str(manifest.get("version", ""))
          files = manifest.get("files")
          if not re.fullmatch(r"\d+\.\d+\.\d+", version):
              raise SystemExit(f"Invalid manifest version: {version!r}")
          if not isinstance(files, dict):
              raise SystemExit("Manifest files field is missing or invalid")

          for path, checksum in files.items():
              if not re.fullmatch(r"SKILL\.md|modules/[a-z0-9-]+\.(?:md|js)", path):
                  raise SystemExit(f"Unsafe path in manifest: {path!r}")
              if ".." in path or path.startswith(("/", "~")) or "\\" in path:
                  raise SystemExit(f"Unsafe path in manifest: {path!r}")
              if not isinstance(checksum, str) or not checksum.startswith("sha256:"):
                  raise SystemExit(f"Unsupported checksum for {path!r}")

          expected = files.get("SKILL.md")
          if not isinstance(expected, str) or not expected.startswith("sha256:"):
              raise SystemExit("SKILL.md checksum missing from manifest")

          content = fetch(source_url)
          actual = hashlib.sha256(content).hexdigest()
          expected_digest = expected.removeprefix("sha256:")
          if actual != expected_digest:
              raise SystemExit(
                  f"Checksum mismatch for SKILL.md: expected {expected_digest}, got {actual}"
              )

          target.parent.mkdir(parents=True, exist_ok=True)
          target.write_bytes(content)
          metadata_target.write_text(
              json.dumps(
                  {
                      "name": "bybit-trading",
                      "version": version,
                      "source": source_url,
                      "manifest": manifest_url,
                      "sha256": actual,
                      "vendor": "Bybit",
                      "usage_policy": {
                          "default_environment": "testnet",
                          "mainnet_write_requires_human_confirm": True,
                          "withdraw_permission_forbidden": True,
                      },
                  },
                  ensure_ascii=False,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          print(f"Verified Bybit skill v{version}: sha256:{actual}")
          PY

      - name: Commit synchronized skill
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "SharipovAI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add skills/bybit-trading/SKILL.md skills/bybit-trading/SOURCE.json
          if git diff --cached --quiet; then
            echo "Bybit skill is already current."
            exit 0
          fi
          git commit -m "feat: vendor verified Bybit trading skill"
          git push origin HEAD:feat/bybit-trading-skill
