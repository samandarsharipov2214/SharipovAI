name: Full Regression Windows

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/*.ps1'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/full-regression-windows.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/*.ps1'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/full-regression-windows.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-full-regression-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  full-regression-windows:
    if: >-
      ${{
        vars.SHARIPOVAI_WINDOWS_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, Windows, X64, sharipovai-windows-ci]
    timeout-minutes: 45
    env:
      PYTHONPATH: .
      PYTHONDONTWRITEBYTECODE: '1'
      SHARIPOVAI_DISABLE_AUTH: '1'
      SHARIPOVAI_DATABASE_REQUIRED: '0'
      SHARIPOVAI_DATA_DIR: ${{ runner.temp }}\sharipovai-data
      MARKET_STREAM_ENABLED: '0'
      AUTONOMOUS_PAPER_ENABLED: '0'
      AUTONOMOUS_TESTNET_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      TESTNET_EXECUTION_ENABLED: '0'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      FEATURE_BYBIT_LIVE_EXECUTION: '0'
      FEATURE_BYBIT_TESTNET_EXECUTION: '0'
      FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
      BYBIT_ALLOW_LEGACY_EXCHANGE_CREDENTIALS: '0'
      EXECUTION_KILL_SWITCH: '1'
      EXCHANGE_MODE: sandbox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet

      - name: Compile repository
        shell: pwsh
        run: python -m compileall -q .

      - name: Run full regression suite
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:SHARIPOVAI_DATA_DIR | Out-Null
          python -m pytest -q --disable-warnings --maxfail=1 *> full-pytest-windows.log
          $exitCode = $LASTEXITCODE
          Get-Content full-pytest-windows.log
          exit $exitCode

      - name: Upload Windows regression diagnostic
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-pytest-windows-failure-log
          path: full-pytest-windows.log
          if-no-files-found: error
          retention-days: 3
