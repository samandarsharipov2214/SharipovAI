name: Isolated Full Pytest

on:
  push:
    branches:
      - verify/full-pytest-isolated-v2
    paths-ignore:
      - '**/*.md'
      - '.ci-results/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: isolated-full-pytest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-pytest:
    if: ${{ vars.SHARIPOVAI_SELF_HOSTED_CI == '1' }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 45
    env:
      PYTHONPATH: .
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      ADMIN_USERNAME: ci-admin
      ADMIN_PASSWORD: ci-test-password
      AUTH_SECRET: ci-test-secret
      SHARIPOVAI_DISABLE_AUTH: '1'
      SHARIPOVAI_DATABASE_REQUIRED: '0'
      MARKET_STREAM_ENABLED: '0'
      AUTONOMOUS_PAPER_ENABLED: '0'
      AUTONOMOUS_TESTNET_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      TESTNET_EXECUTION_ENABLED: '0'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      EXECUTION_KILL_SWITCH: '1'
      EXCHANGE_MODE: sandbox
      BYBIT_ALLOW_LEGACY_EXCHANGE_CREDENTIALS: '0'
      SHARIPOVAI_DATA_DIR: ${{ github.workspace }}/.ci-data

    steps:
      - name: Checkout isolated verification branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet

      - name: Compile all Python sources
        run: python -m compileall -q $(git ls-files '*.py')

      - name: Run full regression suite
        id: pytest
        shell: bash
        run: |
          set +e
          set -o pipefail
          python -m pytest -q --disable-warnings --maxfail=1 2>&1 | tee isolated-pytest.log
          code=${PIPESTATUS[0]}
          echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload compact pytest diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: isolated-pytest-${{ github.run_id }}
          path: isolated-pytest.log
          if-no-files-found: error
          retention-days: 7

      - name: Publish machine-readable result
        if: always()
        env:
          PYTEST_EXIT_CODE: ${{ steps.pytest.outputs.exit_code || '99' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci-results
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          log_path = Path('isolated-pytest.log')
          text = log_path.read_text(encoding='utf-8', errors='replace') if log_path.exists() else ''
          code = int(os.environ.get('PYTEST_EXIT_CODE', '99'))
          payload = {
              'status': 'success' if code == 0 else 'failure',
              'exit_code': code,
              'tested_commit': os.environ['GITHUB_SHA'],
              'run_id': os.environ['GITHUB_RUN_ID'],
              'log_tail': text[-12000:],
          }
          Path('.ci-results/isolated.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2),
              encoding='utf-8',
          )
          PY
          git config user.name "SharipovAI CI"
          git config user.email "actions@github.com"
          git add .ci-results/isolated.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: publish isolated pytest result [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Fail when regression suite failed
        if: ${{ steps.pytest.outputs.exit_code != '0' }}
        run: exit 1
