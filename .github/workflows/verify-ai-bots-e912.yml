name: Verify AI Bots E912

on:
  pull_request:
    branches: [agent/maximum-velocity-phase1]
    paths:
      - 'dashboard/tests/test_ai_bots_and_chat.py'
      - '.github/workflows/verify-ai-bots-e912.yml'

permissions:
  contents: read

jobs:
  targeted:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SHARIPOVAI_DISABLE_AUTH: '1'
      SHARIPOVAI_DATABASE_REQUIRED: '1'
      EXECUTION_KILL_SWITCH: '1'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      TESTNET_EXECUTION_ENABLED: '0'
      AUTONOMOUS_TESTNET_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      DATABASE_URL: sqlite:////tmp/sharipovai-ai-bots-${{ github.run_id }}.db
    steps:
      - name: Checkout exact fixed commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: e91228dd1b6079073afc007250b89eedfb25a6f5
          persist-credentials: false

      - name: Verify exact SHA
        run: test "$(git rev-parse HEAD)" = "e91228dd1b6079073afc007250b89eedfb25a6f5"

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip check

      - name: Run AI bots regression tests
        run: python -m pytest dashboard/tests/test_ai_bots_and_chat.py -q --tb=short
