name: Project Guardrails

on:
  push:
    branches: [main, agent/maximum-velocity-phase1]
    paths:
      - 'dashboard/**'
      - 'exchange_connector/**'
      - 'autonomous_trading/**'
      - 'risk_engine/**'
      - 'trading_core/**'
      - 'storage/**'
      - 'scripts/release_audit.py'
      - 'scripts/migrate_project_db.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/project-guardrails.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'exchange_connector/**'
      - 'autonomous_trading/**'
      - 'risk_engine/**'
      - 'trading_core/**'
      - 'storage/**'
      - 'scripts/release_audit.py'
      - 'scripts/migrate_project_db.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - '.github/workflows/project-guardrails.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: guardrails-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 25
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      ADMIN_USERNAME: ci-admin
      ADMIN_PASSWORD: ci-test-password
      AUTH_SECRET: ci-test-secret
      SHARIPOVAI_DISABLE_AUTH: '1'
      DATABASE_URL: sqlite:////tmp/sharipovai-guardrails-${{ github.run_id }}.db
      SHARIPOVAI_DATABASE_REQUIRED: '1'
      MARKET_STREAM_ENABLED: '0'
      AUTONOMOUS_PAPER_ENABLED: '0'
      AUTONOMOUS_TESTNET_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      TESTNET_EXECUTION_ENABLED: '0'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      FEATURE_BYBIT_LIVE_EXECUTION: '0'
      FEATURE_BYBIT_TESTNET_EXECUTION: '0'
      FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
      BYBIT_ALLOW_LEGACY_EXCHANGE_CREDENTIALS: '0'
      EXECUTION_KILL_SWITCH: '1'
      AUTONOMOUS_TRADING_STAGE: '2'
      EXCHANGE_MODE: sandbox
      EXCHANGE_BASE_URL: https://api-testnet.bybit.com
      BYBIT_ACCOUNT_SYNC_ENABLED: '0'
      EXECUTION_JOURNAL_FILE: /tmp/sharipovai-guardrails-journal-${{ github.run_id }}.json
      TESTNET_BRIDGE_STATE_FILE: /tmp/sharipovai-guardrails-bridge-${{ github.run_id }}.json

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip check

      - name: Initialize canonical project database
        run: python scripts/migrate_project_db.py

      - name: Compile all Python modules
        run: python -m compileall -q .

      - name: Import application safely
        run: |
          python - <<'PY'
          import dashboard
          from autonomous_trading import StartupExecutionReconciler
          from exchange_connector import ApprovedExecutionRequest, ExecutionIdempotencyRepository
          from trading_core import EventDrivenBacktester
          assert dashboard.app is not None
          assert StartupExecutionReconciler is not None
          assert ApprovedExecutionRequest is not None
          assert ExecutionIdempotencyRepository is not None
          assert EventDrivenBacktester is not None
          print('critical imports: ok')
          PY

      - name: Verify execution remains locked
        run: |
          python - <<'PY'
          from exchange_connector.bybit_execution import BybitExecutionClient
          from exchange_connector.execution_contract import MAINNET_EXECUTION_COMPILED
          status = BybitExecutionClient().status()
          assert MAINNET_EXECUTION_COMPILED is False
          assert status['kill_switch'] is True
          assert status['testnet_execution_enabled'] is False
          assert status['live_execution_enabled'] is False
          assert status['mainnet_hard_blocked'] is True
          print(status)
          PY

      - name: Run regression tests
        run: |
          python -m pytest \
            tests/test_execution_contract.py \
            tests/test_execution_idempotency.py \
            tests/test_startup_reconciliation.py \
            tests/test_testnet_bridge_canonical_candidate.py \
            tests/test_sensitive_api_admin_guard.py \
            tests/test_risk_hard_limits.py \
            tests/test_trading_core_backtest.py \
            -q --tb=short

      - name: Run fail-closed release audit
        env:
          SHARIPOVAI_DISABLE_AUTH: '0'
        run: python scripts/release_audit.py --runtime --json
