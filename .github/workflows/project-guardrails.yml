name: Project Guardrails

on:
  push:
    branches: [main, agent/maximum-velocity-phase1]
    paths:
      - 'dashboard/**'
      - 'exchange_connector/**'
      - 'autonomous_trading/**'
      - 'campaigns/**'
      - 'risk_engine/**'
      - 'trading_core/**'
      - 'historical_data/**'
      - 'experiments/**'
      - 'validation/**'
      - 'observability/**'
      - 'storage/**'
      - 'scripts/execution_foundation_audit.py'
      - 'scripts/research_foundation_audit.py'
      - 'scripts/promotion_foundation_audit.py'
      - 'scripts/campaign_foundation_audit.py'
      - 'scripts/release_audit.py'
      - 'scripts/migrate_project_db.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'CONSTITUTION.md'
      - 'README.md'
      - '.github/workflows/project-guardrails.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'exchange_connector/**'
      - 'autonomous_trading/**'
      - 'campaigns/**'
      - 'risk_engine/**'
      - 'trading_core/**'
      - 'historical_data/**'
      - 'experiments/**'
      - 'validation/**'
      - 'observability/**'
      - 'storage/**'
      - 'scripts/execution_foundation_audit.py'
      - 'scripts/research_foundation_audit.py'
      - 'scripts/promotion_foundation_audit.py'
      - 'scripts/campaign_foundation_audit.py'
      - 'scripts/release_audit.py'
      - 'scripts/migrate_project_db.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'CONSTITUTION.md'
      - 'README.md'
      - '.github/workflows/project-guardrails.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: guardrails-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 40
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      ADMIN_USERNAME: ci-admin
      ADMIN_PASSWORD: ci-test-password
      AUTH_SECRET: ci-test-secret
      SHARIPOVAI_DISABLE_AUTH: '1'
      DATABASE_URL: sqlite:////tmp/sharipovai-guardrails-${{ github.run_id }}.db
      SHARIPOVAI_DATABASE_REQUIRED: '1'
      MARKET_STREAM_ENABLED: '0'
      AUTONOMOUS_PAPER_ENABLED: '0'
      AUTONOMOUS_TESTNET_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      TESTNET_EXECUTION_ENABLED: '0'
      RUNTIME_FILL_HARVESTER_ENABLED: '0'
      SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED: '0'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      FEATURE_BYBIT_LIVE_EXECUTION: '0'
      FEATURE_BYBIT_TESTNET_EXECUTION: '0'
      FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
      BYBIT_ALLOW_LEGACY_EXCHANGE_CREDENTIALS: '0'
      EXECUTION_KILL_SWITCH: '1'
      AUTONOMOUS_TRADING_STAGE: '2'
      EXCHANGE_MODE: sandbox
      EXCHANGE_BASE_URL: https://api-testnet.bybit.com
      BYBIT_ACCOUNT_SYNC_ENABLED: '0'
      EXECUTION_JOURNAL_FILE: /tmp/sharipovai-guardrails-journal-${{ github.run_id }}.json
      TESTNET_BRIDGE_STATE_FILE: /tmp/sharipovai-guardrails-bridge-${{ github.run_id }}.json

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements-dev.txt --quiet
          python -m pip install --force-reinstall --no-cache-dir duckdb==1.5.4 --quiet
          python -m pip check
          python - <<'PY'
          import duckdb
          assert duckdb.__version__ == '1.5.4'
          print('duckdb wheel:', duckdb.__version__)
          PY

      - name: Initialize canonical project database
        run: python scripts/migrate_project_db.py

      - name: Compile all Python modules
        run: python -m compileall -q .

      - name: Import application safely
        run: |
          python - <<'PY'
          import campaigns
          import dashboard
          import experiments
          import validation
          from autonomous_trading import ShadowModeTestnetBridge, StartupExecutionReconciler
          from exchange_connector import (
              ApprovedExecutionRequest,
              BybitExecutionStateStore,
              BybitTradingReferenceClient,
              ExecutionIdempotencyRepository,
              PrivateStreamHealthRepository,
          )
          from historical_data import HistoricalDataLoader
          from observability import JsonFormatter
          from trading_core import EventDrivenBacktester, WalkForwardBacktester
          assert dashboard.app is not None
          assert campaigns.ScheduledCampaignOrchestrator is not None
          assert campaigns.TestnetShadowCampaign is not None
          assert campaigns.FinalPromotionReportEngine is not None
          assert experiments.ExperimentRegistry is not None
          assert experiments.AutomaticExperimentRunner is not None
          assert experiments.ChampionChallengerRegistry is not None
          assert experiments.PromotionGateEngine is not None
          assert validation.FillDivergenceAnalyzer is not None
          assert validation.RuntimeFillHarvester is not None
          assert StartupExecutionReconciler is not None
          assert ShadowModeTestnetBridge is not None
          assert ApprovedExecutionRequest is not None
          assert BybitExecutionStateStore is not None
          assert BybitTradingReferenceClient is not None
          assert ExecutionIdempotencyRepository is not None
          assert PrivateStreamHealthRepository is not None
          assert EventDrivenBacktester is not None
          assert WalkForwardBacktester is not None
          assert HistoricalDataLoader is not None
          assert JsonFormatter is not None
          print('critical imports: ok')
          PY

      - name: Verify execution remains locked
        run: |
          python - <<'PY'
          from exchange_connector.bybit_execution import BybitExecutionClient
          from exchange_connector.execution_contract import MAINNET_EXECUTION_COMPILED
          status = BybitExecutionClient().status()
          assert MAINNET_EXECUTION_COMPILED is False
          assert status['kill_switch'] is True
          assert status['testnet_execution_enabled'] is False
          assert status['live_execution_enabled'] is False
          assert status['mainnet_hard_blocked'] is True
          print(status)
          PY

      - name: Run regression tests
        id: regression
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python -m pytest \
            tests/test_historical_data_layer.py \
            tests/test_automatic_experiment_runner.py \
            tests/test_execution_contract.py \
            tests/test_execution_idempotency.py \
            tests/test_startup_reconciliation.py \
            tests/test_private_ws_startup_gate.py \
            tests/test_private_execution_ws.py \
            tests/test_private_order_ws_v3.py \
            tests/test_testnet_bridge_canonical_candidate.py \
            tests/test_bybit_reference_data.py \
            tests/test_bybit_execution_state.py \
            tests/test_shadow_mode.py \
            tests/test_runtime_fill_harvester.py \
            tests/test_scheduled_campaign_orchestrator.py \
            tests/test_final_promotion_report.py \
            tests/test_sensitive_api_admin_guard.py \
            tests/test_risk_hard_limits.py \
            tests/test_trading_core_backtest.py \
            tests/test_trading_core_funding_walk_forward.py \
            tests/test_benchmark_strategies.py \
            tests/test_experiment_registry_promotion.py \
            tests/test_champion_challenger_registry.py \
            tests/test_leadership_dashboard.py \
            tests/test_fill_divergence_validation.py \
            tests/test_experiment_dashboard.py \
            tests/test_observability.py \
            tests/test_execution_status_router.py \
            -q --tb=short \
            2>&1 | tee artifacts/guardrails-tests.log

      - name: Audit execution foundation
        id: execution_audit
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/execution_foundation_audit.py \
            2>&1 | tee artifacts/execution-audit.json

      - name: Audit research foundation
        id: research_audit
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/research_foundation_audit.py --json \
            2>&1 | tee artifacts/research-audit.json

      - name: Audit promotion foundation
        id: promotion_audit
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/promotion_foundation_audit.py --json \
            2>&1 | tee artifacts/promotion-audit.json

      - name: Audit scheduled shadow campaign foundation
        id: campaign_audit
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/campaign_foundation_audit.py --json \
            2>&1 | tee artifacts/campaign-audit.json

      - name: Run fail-closed release audit
        id: release_audit
        if: always()
        continue-on-error: true
        shell: bash
        env:
          SHARIPOVAI_DISABLE_AUTH: '0'
        run: |
          mkdir -p artifacts
          set -o pipefail
          python scripts/release_audit.py --runtime --json \
            2>&1 | tee artifacts/release-audit.json

      - name: Upload guardrail evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phase5-scheduled-campaign-guardrails-${{ github.run_id }}
          path: |
            artifacts/guardrails-tests.log
            artifacts/execution-audit.json
            artifacts/research-audit.json
            artifacts/promotion-audit.json
            artifacts/campaign-audit.json
            artifacts/release-audit.json
          if-no-files-found: error
          retention-days: 14

      - name: Preserve truthful guardrail status
        if: steps.regression.outcome == 'failure' || steps.execution_audit.outcome == 'failure' || steps.research_audit.outcome == 'failure' || steps.promotion_audit.outcome == 'failure' || steps.campaign_audit.outcome == 'failure' || steps.release_audit.outcome == 'failure'
        run: |
          for file in artifacts/*.json artifacts/*.log; do
            [ -f "$file" ] && { echo "===== $file ====="; cat "$file"; }
          done
          exit 1
