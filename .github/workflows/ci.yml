name: Проверка SharipovAI

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/*.sh'
      - '**/*.ps1'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/*.sh'
      - '**/*.ps1'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sharipovai-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 30
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Настроить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet

      - name: Проверить синтаксис всех Python-файлов
        run: python -m compileall -q $(git ls-files '*.py')

      - name: Запустить полный набор тестов
        env:
          PYTHONPATH: .
          SHARIPOVAI_DATABASE_REQUIRED: '0'
          EXECUTION_KILL_SWITCH: '1'
          TESTNET_EXECUTION_ENABLED: '0'
          EXCHANGE_LIVE_TRADING_ENABLED: '0'
        run: |
          set -o pipefail
          python -m pytest -q --disable-warnings --maxfail=1 2>&1 | tee pytest-ci.log

      - name: Сохранить полный pytest log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: full-pytest-failure-log
          path: pytest-ci.log
          if-no-files-found: error
          retention-days: 3
