name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.8'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -r requirements.txt --quiet

      - name: Run tests
        id: pytest
        continue-on-error: true
        env:
          SHARIPOVAI_DISABLE_AUTH: '1'
          AUTH_SECRET: test-secret-for-ci-only
        run: |
          python -m pytest -q --maxfail=1 > pytest-output.txt 2>&1
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output
          path: pytest-output.txt

      - name: Fail when pytest failed
        if: steps.pytest.outputs.exit_code != '0'
        run: exit 1
