name: Проверка SharipovAI

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/*.sh'
      - '**/*.ps1'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/*.sh'
      - '**/*.ps1'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sharipovai-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 40
    env:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      PYTHONPATH: .
      ADMIN_USERNAME: ci-admin
      ADMIN_PASSWORD: ci-test-password
      AUTH_SECRET: ci-test-secret
      SHARIPOVAI_DISABLE_AUTH: '1'
      SHARIPOVAI_DATABASE_REQUIRED: '1'
      DATABASE_URL: sqlite:////tmp/sharipovai-full-${{ github.run_id }}.db
      MARKET_STREAM_ENABLED: '0'
      AUTONOMOUS_PAPER_ENABLED: '0'
      AUTONOMOUS_TESTNET_ENABLED: '0'
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: '0'
      TESTNET_EXECUTION_ENABLED: '0'
      FEATURE_BYBIT_PRIVATE_ORDER_WS: '0'
      FEATURE_BYBIT_LIVE_EXECUTION: '0'
      FEATURE_BYBIT_TESTNET_EXECUTION: '0'
      RUNTIME_FILL_HARVESTER_ENABLED: '0'
      SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED: '0'
      PHASE6_TESTNET_RELEASE_GATE: 'blocked'
      EXCHANGE_LIVE_TRADING_ENABLED: '0'
      LIVE_EXECUTION_MANUAL_UNLOCK: '0'
      LIVE_EXECUTION_CONFIRMATION: ''
      EXECUTION_KILL_SWITCH: '1'
      EXCHANGE_MODE: sandbox
      EXCHANGE_BASE_URL: https://api-testnet.bybit.com
      AUTONOMOUS_PAPER_STATE_FILE: /tmp/sharipovai-full-paper-${{ github.run_id }}.json
      VIRTUAL_ACCOUNT_STATE_FILE: /tmp/sharipovai-full-virtual-${{ github.run_id }}.json
      MARKET_STREAM_STATE_FILE: /tmp/sharipovai-full-market-${{ github.run_id }}.json
      TESTNET_BRIDGE_STATE_FILE: /tmp/sharipovai-full-bridge-${{ github.run_id }}.json
      EXECUTION_JOURNAL_FILE: /tmp/sharipovai-full-journal-${{ github.run_id }}.json

    steps:
      - name: Получить код
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Настроить Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet
          python -m pip check

      - name: Проверить синтаксис всех Python-файлов
        run: python -m compileall -q $(git ls-files '*.py')

      - name: Запустить полный набор тестов
        id: pytest
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          python -m pytest -q --disable-warnings \
            --junitxml=artifacts/sharipovai-full-junit.xml \
            2>&1 | tee artifacts/sharipovai-full.log

      - name: Сохранить полный отчёт
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sharipovai-full-${{ github.run_id }}
          path: |
            artifacts/sharipovai-full.log
            artifacts/sharipovai-full-junit.xml
            artifacts/runtime-state-*.json
          if-no-files-found: error
          retention-days: 7

      - name: Сохранить правдивый статус
        if: always()
        shell: bash
        run: test '${{ steps.pytest.outcome }}' = 'success'
