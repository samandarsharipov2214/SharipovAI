name: Проверка SharipovAI

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/*.sh'
      - '**/*.ps1'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'
      - '**/*.sh'
      - '**/*.ps1'
      - 'requirements.txt'
      - 'pyproject.toml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sharipovai-check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 40
    steps:
      - name: Получить код
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Настроить Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install -r requirements.txt --quiet
          python -m pip check

      - name: Проверить синтаксис всех Python-файлов
        run: python -m compileall -q $(git ls-files '*.py')

      - name: Запустить полный набор тестов
        id: pytest
        continue-on-error: true
        shell: bash
        env:
          PYTHONPATH: .
          SHARIPOVAI_DATABASE_REQUIRED: '0'
          EXECUTION_KILL_SWITCH: '1'
          TESTNET_EXECUTION_ENABLED: '0'
          EXCHANGE_LIVE_TRADING_ENABLED: '0'
        run: |
          mkdir -p artifacts
          set -o pipefail
          python -m pytest -q --disable-warnings \
            --junitxml=artifacts/sharipovai-full-junit.xml \
            2>&1 | tee artifacts/sharipovai-full.log

      - name: Сохранить полный отчёт
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sharipovai-full-${{ github.run_id }}
          path: |
            artifacts/sharipovai-full.log
            artifacts/sharipovai-full-junit.xml
            artifacts/runtime-state-*.json
          if-no-files-found: error
          retention-days: 7

      - name: Сохранить правдивый статус
        if: always()
        shell: bash
        run: test '${{ steps.pytest.outcome }}' = 'success'
