name: Bootstrap self-hosted runner probe

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  probe:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 5
    steps:
      - name: Identify runner host
        shell: bash
        run: |
          set -euo pipefail
          echo "RUNNER_OK"
          hostname
          id
          test -d /opt/sharipovai-repo || test -d /opt/SharipovAI

      - name: Enable repository self-hosted CI variable
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/variables/SHARIPOVAI_SELF_HOSTED_CI"
          payload='{"name":"SHARIPOVAI_SELF_HOSTED_CI","value":"1"}'
          status="$(curl -sS -o /tmp/variable-response.json -w '%{http_code}' \
            -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "$api" -d "$payload")"
          if [ "$status" = "404" ]; then
            status="$(curl -sS -o /tmp/variable-response.json -w '%{http_code}' \
              -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/variables" \
              -d "$payload")"
          fi
          cat /tmp/variable-response.json || true
          test "$status" = "201" -o "$status" = "204"
