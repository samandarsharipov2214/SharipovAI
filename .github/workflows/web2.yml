name: SharipoAI Web 2

on:
  pull_request:
    branches: [main]
    paths:
      - 'web2/**'
      - '.github/workflows/web2.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web2-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: >-
      ${{
        vars.SHARIPOVAI_SELF_HOSTED_CI == '1' &&
        (github.event_name != 'pull_request' ||
         github.event.pull_request.head.repo.full_name == github.repository)
      }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web2/package-lock.json

      - name: Install dependencies
        run: npm ci --silent --no-audit --no-fund

      - name: Lint
        run: npx eslint .

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://sharipovai-bot.onrender.com

      - name: Runtime smoke test
        shell: bash
        env:
          PORT: '3100'
          NEXT_PUBLIC_API_BASE_URL: https://sharipovai-bot.onrender.com
        run: |
          set -euo pipefail
          npm run start > /tmp/sharipoai-web2.log 2>&1 &
          pid=$!
          trap 'kill $pid 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3100/ > /tmp/sharipoai-home.html; then
              break
            fi
            sleep 1
          done
          grep -q 'SharipoAI' /tmp/sharipoai-home.html
          curl --fail --silent http://127.0.0.1:3100/sharipoai-logo.svg > /tmp/sharipoai-logo.svg
          grep -q '<svg' /tmp/sharipoai-logo.svg
          test -s /tmp/sharipoai-home.html
          echo 'SharipoAI Web 2 runtime smoke test passed'
