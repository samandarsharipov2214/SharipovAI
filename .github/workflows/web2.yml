name: SharipoAI Web 2

on:
  pull_request:
    paths:
      - 'web2/**'
      - '.github/workflows/web2.yml'
  workflow_dispatch:

concurrency:
  group: web2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web2/package-lock.json
      - run: npm install
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://sharipovai-bot.onrender.com
