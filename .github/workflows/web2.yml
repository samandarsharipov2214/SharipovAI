name: SharipoAI Web 2

on:
  pull_request:
    paths:
      - 'web2/**'
      - '.github/workflows/web2.yml'
  workflow_dispatch:

concurrency:
  group: web2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install --silent --no-audit --no-fund
      - name: Lint
        id: lint
        shell: bash
        run: |
          set +e
          npx eslint . --format json > lint-report.json
          code=$?
          node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('lint-report.json','utf8'));const out=[];for(const f of r){for(const m of f.messages){out.push(`${f.filePath}:${m.line}:${m.column} ${m.severity===2?'error':'warning'} ${m.ruleId||''} ${m.message}`)}}console.log(out.slice(0,80).join('\n')||'No lint issues');"
          exit $code
      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web2-lint-report
          path: web2/lint-report.json
      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://sharipovai-bot.onrender.com
