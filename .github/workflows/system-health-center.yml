name: System Health Center

on:
  pull_request:
    branches:
      - main
    paths:
      - 'dashboard/system_health_api.py'
      - 'dashboard/__init__.py'
      - 'tests/test_system_health_center.py'
      - '.github/workflows/system-health-center.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-center-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements.txt

      - name: Compile Health Center
        run: |
          python -m py_compile dashboard/system_health_api.py
          python - <<'PY'
          import dashboard
          from dashboard.system_health_api import SystemHealthCenter
          print('HEALTH_CENTER_IMPORT_OK', dashboard.app.title, SystemHealthCenter.__name__)
          PY

      - name: Run focused tests
        run: python -m pytest tests/test_system_health_center.py -q --tb=short
