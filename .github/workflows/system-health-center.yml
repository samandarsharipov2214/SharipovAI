name: System Health Center

on:
  pull_request:
    branches:
      - main
    paths:
      - 'dashboard/system_health_api.py'
      - 'dashboard/__init__.py'
      - 'tests/test_system_health_center.py'
      - '.github/workflows/system-health-center.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runner-shell:
    name: runner-shell
    runs-on: ubuntu-latest
    steps:
      - run: echo RUNNER_OK

  checkout-smoke:
    name: checkout-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f requirements.txt

  system-python:
    name: system-python
    runs-on: ubuntu-latest
    steps:
      - run: python3 --version

  syntax:
    name: syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m py_compile dashboard/system_health_api.py tests/test_system_health_center.py

  dashboard-import:
    name: dashboard-import
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements.txt
      - run: |
          python - <<'PY'
          import dashboard
          from dashboard.system_health_api import SystemHealthCenter
          print('HEALTH_CENTER_IMPORT_OK', dashboard.app.title, SystemHealthCenter.__name__)
          PY

  contract-tests:
    name: contract-${{ matrix.contract }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        contract:
          - healthy-runtime
          - kill-switch-block
          - recovery-advisory
          - installer-idempotent
          - non-finite-threshold
        include:
          - contract: healthy-runtime
            expression: test_health_center_reports_healthy_runtime
          - contract: kill-switch-block
            expression: test_missing_kill_switch_blocks_system_even_with_other_components_healthy
          - contract: recovery-advisory
            expression: test_recovery_plan_is_advisory_and_never_financially_automatic
          - contract: installer-idempotent
            expression: test_installer_is_idempotent
          - contract: non-finite-threshold
            expression: test_non_finite_threshold_falls_back_safely
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -r requirements.txt
      - run: python -m pytest tests/test_system_health_center.py -q --tb=short -k '${{ matrix.expression }}'
