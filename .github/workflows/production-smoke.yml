name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: read

concurrency:
  group: sharipovai-production-smoke
  cancel-in-progress: true

jobs:
  smoke:
    if: ${{ vars.SHARIPOVAI_SELF_HOSTED_CI == '1' }}
    runs-on: [self-hosted, linux, x64, sharipovai-ci]
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check deployed SharipovAI
        run: |
          python scripts/production_smoke.py \
            --base-url https://sharipovai-bot.onrender.com \
            --attempts 5 \
            --timeout 20 \
            --sleep 8 \
            --json
