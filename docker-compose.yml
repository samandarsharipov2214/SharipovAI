version: "3.9"

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sharipovai
      POSTGRES_USER: sharipovai
      POSTGRES_PASSWORD: sharipovai-change-me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sharipovai -d sharipovai"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://sharipovai:sharipovai-change-me@db:5432/sharipovai
      APP_BASE_URL: http://localhost
      AUTH_COOKIE_SECURE: "0"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
