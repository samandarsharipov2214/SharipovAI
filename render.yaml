databases:
  - name: sharipovai-db
    databaseName: sharipovai
    user: sharipovai
    ipAllowList: []

services:
  - type: web
    name: sharipovai-web
    env: python
    buildCommand: cd web2 && npm install --no-audit --no-fund && npm run build && cd .. && pip install -r requirements.txt
    preDeployCommand: python scripts/migrate_project_db.py
    startCommand: uvicorn dashboard:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    disk:
      name: sharipovai-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sharipovai-db
          property: connectionString
      - key: SHARIPOVAI_DATABASE_REQUIRED
        value: "1"
      - key: AUTH_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SHARIPOVAI_DISABLE_AUTH
        value: "0"
      - key: SHARIPOVAI_DATA_DIR
        value: /var/data
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_AUTO_SET_WEBHOOK
        value: "1"
      - key: TELEGRAM_POLLING_ENABLED
        value: "0"
      - key: MARKET_STREAM_ENABLED
        value: "1"
      - key: MARKET_STREAM_SYMBOLS
        value: BTCUSDT,ETHUSDT,SOLUSDT
      - key: MARKET_STREAM_STALE_SECONDS
        value: "15"
      - key: MARKET_STREAM_STATE_FILE
        value: /var/data/market_stream.json
      - key: AUTONOMOUS_PAPER_ENABLED
        value: "1"
      - key: AUTONOMOUS_PAPER_TICK_SECONDS
        value: "5"
      - key: AUTONOMOUS_PAPER_INITIAL_CASH
        value: "10000"
      - key: AUTONOMOUS_PAPER_MAX_POSITION_PERCENT
        value: "10"
      - key: AUTONOMOUS_PAPER_STOP_LOSS_PERCENT
        value: "1.5"
      - key: AUTONOMOUS_PAPER_TAKE_PROFIT_PERCENT
        value: "3.0"
      - key: AUTONOMOUS_PAPER_STATE_FILE
        value: /var/data/autonomous_paper.json
      - key: AUTONOMOUS_TESTNET_BRIDGE_ENABLED
        value: "1"
      - key: AUTONOMOUS_TESTNET_ENABLED
        value: "0"
      - key: TESTNET_EXECUTION_ENABLED
        value: "0"
      - key: TESTNET_BRIDGE_TICK_SECONDS
        value: "5"
      - key: TESTNET_BRIDGE_STATE_FILE
        value: /var/data/testnet_bridge.json
      - key: EXECUTION_JOURNAL_FILE
        value: /var/data/execution_journal.json
      - key: EXECUTION_MAX_NOTIONAL_USDT
        value: "25"
      - key: EXECUTION_KILL_SWITCH
        value: "1"
      - key: AUTONOMOUS_TRADING_STAGE
        value: "2"
      - key: BYBIT_READONLY_API_KEY
        sync: false
      - key: BYBIT_READONLY_API_SECRET
        sync: false
      - key: BYBIT_TESTNET_API_KEY
        sync: false
      - key: BYBIT_TESTNET_API_SECRET
        sync: false
      - key: BYBIT_MAINNET_API_KEY
        sync: false
      - key: BYBIT_MAINNET_API_SECRET
        sync: false
      - key: BYBIT_ALLOW_LEGACY_EXCHANGE_CREDENTIALS
        value: "0"
      - key: FEATURE_BYBIT_PRIVATE_ORDER_WS
        value: "0"
      - key: BYBIT_ACCOUNT_SYNC_ENABLED
        value: "1"
      - key: BYBIT_ACCOUNT_SYNC_SECONDS
        value: "15"
      - key: BYBIT_ACCOUNT_STATE_FILE
        value: /var/data/bybit_account.json
      - key: BYBIT_ACCOUNT_BASE_URL
        value: https://api.bybit.eu
      - key: VIRTUAL_ACCOUNT_AUTORUN_ENABLED
        value: "1"
      - key: VIRTUAL_ACCOUNT_TICK_SECONDS
        value: "60"
      - key: VIRTUAL_ACCOUNT_MAX_OPEN
        value: "8"
      - key: VIRTUAL_ACCOUNT_MAX_CATCH_UP_TICKS
        value: "48"
      - key: NEWS_AUTORUN_ENABLED
        value: "1"
      - key: NEWS_REFRESH_SECONDS
        value: "180"
      - key: NEWS_STALE_SECONDS
        value: "240"
      - key: NEWS_LIMIT_PER_SOURCE
        value: "5"
      - key: NEWS_AGENT_NETWORK_ENABLED
        value: "1"
      - key: NEWS_AGENT_MEMORY_LIMIT
        value: "500"
      - key: NEWS_AGENT_EVENT_LIMIT
        value: "1000"
      - key: EXCHANGE_NAME
        value: bybit
      - key: EXCHANGE_MODE
        value: sandbox
      - key: EXCHANGE_BASE_URL
        value: https://api-testnet.bybit.com
      - key: EXCHANGE_DEFAULT_FEE_RATE
        value: "0.001"
      - key: EXCHANGE_LIVE_TRADING_ENABLED
        value: "0"

  - type: worker
    name: sharipovai-telegram-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scripts/run_telegram_worker.py
