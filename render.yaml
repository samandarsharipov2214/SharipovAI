services:
  - type: web
    name: sharipovai-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn dashboard:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AUTH_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SHARIPOVAI_DISABLE_AUTH
        value: "0"
      - key: BOT_TOKEN
        sync: false
      - key: WEBAPP_URL
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: TELEGRAM_AUTO_SET_WEBHOOK
        value: "1"
      - key: TELEGRAM_POLLING_ENABLED
        value: "0"
      - key: PAPER_ACTIVITY_AUTORUN_ENABLED
        value: "1"
      - key: PAPER_ACTIVITY_TICK_SECONDS
        value: "60"
      - key: PAPER_ACTIVITY_MAX_OPEN
        value: "8"
      - key: PAPER_ACTIVITY_MAX_CATCH_UP_TICKS
        value: "48"
      - key: NEWS_AUTORUN_ENABLED
        value: "1"
      - key: NEWS_REFRESH_SECONDS
        value: "180"
      - key: NEWS_STALE_SECONDS
        value: "240"
      - key: NEWS_LIMIT_PER_SOURCE
        value: "5"
      - key: EXCHANGE_NAME
        value: bybit
      - key: EXCHANGE_MODE
        value: sandbox
      - key: EXCHANGE_BASE_URL
        value: https://api-testnet.bybit.com
      - key: EXCHANGE_DEFAULT_FEE_RATE
        value: "0.001"
      - key: EXCHANGE_LIVE_TRADING_ENABLED
        value: "0"

  - type: worker
    name: sharipovai-telegram-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "print('telegram webhook mode')"
    envVars:
      - key: TELEGRAM_POLLING_ENABLED
        value: "0"
