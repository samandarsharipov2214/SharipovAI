  <div class="app">
    <aside>
      <img src="/static/web2/logo.svg?v=6" class="logo" alt="SharipovAI">
      <nav id="nav" aria-label="Главное меню">
        <button class="active" data-page="overview">Обзор</button>
        <button data-page="market">Рынок</button>
        <button data-page="decision">Решение ИИ</button>
        <button data-page="portfolio">Портфель</button>
        <button data-page="trades">Сделки</button>
        <button data-page="bots">Центр ИИ</button>
        <button data-page="chat">ИИ-чат</button>
        <button data-page="news">Новости</button>
        <button data-page="risk">Центр рисков</button>
        <button data-page="bybit">Bybit</button>

        <button data-page="control">Главное управление</button>

      </header>
      <div id="notice" class="notice hidden"></div>
      <section id="content" aria-live="polite">
        <div class="title"><h1>Центр управления</h1><p>Загрузка состояния SharipovAI</p></div>
        <article class="panel wide"><small>SHARIPOVAI</small><h2>Интерфейс готов</h2><p>Данные появятся после ответа API.</p></article>
