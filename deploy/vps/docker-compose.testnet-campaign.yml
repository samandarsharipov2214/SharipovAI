services:
  sharipovai:
    environment:
      EXCHANGE_MODE: sandbox
      EXCHANGE_BASE_URL: https://api-testnet.bybit.com
      EXCHANGE_LIVE_TRADING_ENABLED: "0"
      FEATURE_BYBIT_LIVE_EXECUTION: "0"
      EXECUTION_KILL_SWITCH: "0"
      TESTNET_EXECUTION_ENABLED: "1"
      AUTONOMOUS_TESTNET_ENABLED: "1"
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: "1"
      FEATURE_BYBIT_TESTNET: "1"
      FEATURE_BYBIT_PRIVATE_ORDER_WS: "1"
      RUNTIME_FILL_HARVESTER_ENABLED: "1"
      SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED: "0"
      CRITICAL_ALERT_MONITOR_ENABLED: "1"
      EXECUTION_MAX_NOTIONAL_USDT: "25"
      SHADOW_TESTNET_MAX_NOTIONAL_USDT: "25"
      PHASE6_TESTNET_RELEASE_GATE: ${PHASE6_TESTNET_RELEASE_GATE:?PHASE6_TESTNET_RELEASE_GATE is required}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:?BYBIT_TESTNET_API_KEY is required}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:?BYBIT_TESTNET_API_SECRET is required}
    labels:
      ai.sharipov.runtime-mode: bounded-testnet-campaign
      ai.sharipov.mainnet-enabled: "false"
      ai.sharipov.campaign-start-mode: manual-only
