services:
  sharipovai:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: sharipovai
    restart: unless-stopped
    env_file:
      - .env.vps
    environment:
      ENVIRONMENT: production
      PORT: 8000
      SHARIPOVAI_DATA_DIR: /var/lib/sharipovai
      BYBIT_ACCOUNT_STATE_FILE: /var/lib/sharipovai/bybit_account.json
      FEATURE_BYBIT_WEBSOCKET: "1"
      BYBIT_WS_SYMBOLS: "BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT"
      BYBIT_WS_MAX_QUOTE_AGE_SECONDS: "2.5"
      EXCHANGE_LIVE_TRADING_ENABLED: "0"
      EXECUTION_KILL_SWITCH: "1"
    volumes:
      - sharipovai_data:/var/lib/sharipovai
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    container_name: sharipovai-caddy
    restart: unless-stopped
    depends_on:
      sharipovai:
        condition: service_healthy
    env_file:
      - .env.vps
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  sharipovai_data:
  caddy_data:
  caddy_config:
