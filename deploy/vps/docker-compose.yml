services:
  sharipovai:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: sharipovai
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    env_file:
      - .env.vps
    environment:
      ENVIRONMENT: production
      PORT: 8000
      SHARIPOVAI_DATA_DIR: /var/lib/sharipovai
      BYBIT_ACCOUNT_STATE_FILE: /var/lib/sharipovai/bybit_account.json
      FEATURE_BYBIT_WEBSOCKET: "1"
      BYBIT_WS_SYMBOLS: "BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT"
      BYBIT_WS_MAX_QUOTE_AGE_SECONDS: "2.5"
      PHASE7_CAMPAIGN_MONITOR_ENABLED: "1"
      PHASE7_MONITOR_INTERVAL_SECONDS: "3"
      PHASE7_MONITOR_STALE_SECONDS: "20"
      PHASE7_CAMPAIGN_REPORT_DIR: /var/lib/sharipovai/campaign_reports
      EXCHANGE_LIVE_TRADING_ENABLED: "0"
      EXECUTION_KILL_SWITCH: "1"
    volumes:
      - sharipovai_data:/var/lib/sharipovai
    tmpfs:
      - /tmp:size=256m,mode=1777
    ports:
      - "127.0.0.1:8000:8000"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--max-time", "5", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 6s
      retries: 6
      start_period: 60s

  caddy:
    image: caddy:2-alpine
    container_name: sharipovai-caddy
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    depends_on:
      sharipovai:
        condition: service_healthy
    env_file:
      - .env.vps
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  sharipovai_data:
  caddy_data:
  caddy_config:
