services:
  sharipovai:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        VCS_REF: ${SHARIPOVAI_RELEASE_SHA:-unknown}
        BUILD_DATE: ${SHARIPOVAI_BUILD_DATE:-unknown}
    image: sharipovai:${SHARIPOVAI_RELEASE_TAG:-local}
    container_name: sharipovai
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    env_file:
      - .env.vps
    environment:
      ENVIRONMENT: production
      PORT: 8000
      SHARIPOVAI_DATA_DIR: /var/lib/sharipovai
      BYBIT_ACCOUNT_STATE_FILE: /var/lib/sharipovai/bybit_account.json
      FEATURE_BYBIT_WEBSOCKET: "1"
      BYBIT_WS_SYMBOLS: "BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT"
      BYBIT_WS_MAX_QUOTE_AGE_SECONDS: "2.5"
      PHASE7_CAMPAIGN_MONITOR_ENABLED: "1"
      PHASE7_MONITOR_INTERVAL_SECONDS: "3"
      PHASE7_MONITOR_STALE_SECONDS: "20"
      PHASE7_CAMPAIGN_REPORT_DIR: /var/lib/sharipovai/campaign_reports
      CRITICAL_ALERT_MONITOR_ENABLED: "1"
      PHASE8_LIVE_MONITOR_ENABLED: "1"
      PHASE8_LIVE_INTERVAL_SECONDS: "1"
      PHASE8_RISK_ALERTS_ENABLED: "1"
      PHASE8_RISK_ALERT_INTERVAL_SECONDS: "2"
      EXCHANGE_MODE: sandbox
      EXCHANGE_BASE_URL: https://api-testnet.bybit.com
      EXCHANGE_LIVE_TRADING_ENABLED: "0"
      FEATURE_BYBIT_LIVE_EXECUTION: "0"
      EXECUTION_KILL_SWITCH: "1"
      TESTNET_EXECUTION_ENABLED: "0"
      AUTONOMOUS_TESTNET_ENABLED: "0"
      AUTONOMOUS_TESTNET_BRIDGE_ENABLED: "0"
      FEATURE_BYBIT_TESTNET: "0"
      FEATURE_BYBIT_PRIVATE_ORDER_WS: "0"
      RUNTIME_FILL_HARVESTER_ENABLED: "0"
      SCHEDULED_CAMPAIGN_ORCHESTRATOR_ENABLED: "0"
      PHASE6_TESTNET_RELEASE_GATE: blocked
    volumes:
      - sharipovai_data:/var/lib/sharipovai
    tmpfs:
      - /tmp:size=128m,mode=1777
    ports:
      - "127.0.0.1:8000:8000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent --show-error --max-time 4 http://127.0.0.1:8000/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    labels:
      ai.sharipov.service: dashboard
      ai.sharipov.runtime-mode: production-safe
      ai.sharipov.mainnet-enabled: "false"

  caddy:
    image: caddy:2-alpine
    container_name: sharipovai-caddy
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    depends_on:
      sharipovai:
        condition: service_healthy
    env_file:
      - .env.vps
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  sharipovai_data:
  caddy_data:
  caddy_config:
