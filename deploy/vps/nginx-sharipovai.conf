server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # The VPS is currently accessed by plain HTTP on its IP address.
        # FastAPI runs in production mode and therefore marks the session cookie
        # Secure. Browsers correctly refuse to return that cookie over HTTP,
        # which made every dashboard API request return 401 after login.
        # Remove only the Secure attribute at the reverse-proxy boundary until
        # a domain and HTTPS certificate are configured.
        proxy_cookie_flags sharipovai_session nosecure httponly samesite=lax;
    }
}
